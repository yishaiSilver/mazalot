<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Procedural Planet — Rust · WASM</title>
<style>
  :root { color-scheme: dark; }
  html, body {
    margin: 0; min-height: 100%;
    background: radial-gradient(circle at 50% 18%, #12131f 0%, #06060c 70%);
    color: #d7dae6;
    font: 15px/1.5 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  }
  .app { max-width: 880px; margin: 0 auto; padding: 28px 20px 48px;
         display: flex; flex-wrap: wrap; gap: 28px; align-items: flex-start; justify-content: center; }
  h1 { font-size: 14px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase;
       color: #7f86a3; margin: 0 0 14px; }
  .left { text-align: center; position: sticky; top: 20px; }
  .stage {
    width: 360px; height: 360px; max-width: 82vw; max-height: 82vw;
    border-radius: 14px; background: #05060b;
    box-shadow: 0 10px 40px rgba(0,0,0,.6), inset 0 0 0 1px rgba(255,255,255,.05);
    display: block; image-rendering: pixelated;
  }
  .name { font-size: 20px; font-weight: 700; color: #eef1f8; text-transform: capitalize; margin-top: 16px; }
  .sub { font-size: 12px; color: #6b7290; letter-spacing: .04em; }
  .gen { margin-top: 14px; padding: 11px 22px; font: inherit; font-weight: 600;
    color: #06060c; background: linear-gradient(180deg, #eef1f8, #c7cde0);
    border: 0; border-radius: 999px; cursor: pointer; box-shadow: 0 4px 14px rgba(0,0,0,.4); }
  .gen:active { transform: translateY(1px); }

  .panel { width: 340px; background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06);
           border-radius: 14px; padding: 16px 18px 20px; }
  .panel h2 { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: #7f86a3; margin: 0 0 12px; }
  .grp { font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: #565d78;
         margin: 16px 0 8px; border-top: 1px solid rgba(255,255,255,.06); padding-top: 12px; }
  .ctl { margin: 0 0 11px; }
  .ctl label { display: flex; justify-content: space-between; font-size: 12px; color: #9aa0bb; margin-bottom: 4px; }
  .ctl label b { color: #eef1f8; font-variant-numeric: tabular-nums; font-weight: 600; }
  input[type=range] { width: 100%; accent-color: #8fb7ff; cursor: pointer; }
  select, input[type=number] { width: 100%; box-sizing: border-box; padding: 8px 10px; font: inherit; font-size: 13px;
    color: #eef1f8; background: #0e0f18; border: 1px solid rgba(255,255,255,.1); border-radius: 8px; }
  .rowflex { display: flex; gap: 8px; } .rowflex input { flex: 1; }
  .mini { padding: 8px 12px; font: inherit; color: #d7dae6; background: #171826;
    border: 1px solid rgba(255,255,255,.1); border-radius: 8px; cursor: pointer; }
  .mini:active { transform: translateY(1px); }
  .reset { width: 100%; margin-top: 12px; }
  .foot { width: 100%; text-align: center; font-size: 11px; color: #4d536b; letter-spacing: .05em; }
  .foot code { color: #6b7290; }
  .stage-wrap { position: relative; display: inline-block; }
  .crt { position: absolute; inset: 0; border-radius: 14px; pointer-events: none; opacity: 0;
    transition: opacity .2s; mix-blend-mode: multiply;
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,.32) 0, rgba(0,0,0,.32) 1px, transparent 2px, transparent 3px),
      radial-gradient(circle at 50% 50%, transparent 55%, rgba(0,0,0,.5) 100%); }
  .crt.on { opacity: 1; }
  .chk { justify-content: flex-start !important; gap: 8px; cursor: pointer; color: #cfd4e6 !important; }
  .chk input { accent-color: #8fb7ff; }
  .metrics { margin: 16px auto 0; width: 320px; max-width: 82vw; box-sizing: border-box; text-align: left;
    font: 11px/1.55 ui-monospace, Menlo, Consolas, monospace; color: #9aa0bb;
    background: rgba(120,160,255,.05); border: 1px solid rgba(255,255,255,.07); border-radius: 10px;
    padding: 11px 13px; white-space: pre; }
</style>
</head>
<body>
<div class="app">
  <div class="left">
    <h1>Procedural Planet</h1>
    <div class="stage-wrap">
      <canvas class="stage" id="stage" width="360" height="360"></canvas>
      <div class="crt" id="crtfx"></div>
    </div>
    <div class="name" id="name">loading…</div>
    <div class="sub" id="sub">Rust → WebAssembly · live sphere shading</div>
    <button class="gen" id="gen">✦ Generate random</button>
    <pre class="metrics" id="metrics">loading…</pre>
  </div>

  <div class="panel">
    <h2>Controls</h2>
    <div class="ctl"><label>Type</label><select id="type"></select></div>
    <div class="ctl"><label>Seed</label>
      <div class="rowflex"><input type="number" id="seed" min="0" value="1" /><button class="mini" id="rndseed" title="random seed">🎲</button></div>
    </div>
    <div class="ctl"><label>Resolution <b id="resV">64</b></label><input type="range" id="res" min="40" max="240" step="8" value="64" /></div>
    <div class="ctl"><label>Spin speed <b id="spnV">0.012</b></label><input type="range" id="spn" min="0" max="0.05" step="0.002" value="0.012" /></div>

    <div class="grp">Render</div>
    <div class="ctl"><label class="chk"><input type="checkbox" id="baked" /> Bake spin loop → play cached frames</label></div>
    <div class="ctl"><label>Max bake frames <b id="bkfV">300</b></label><input type="range" id="bkf" min="32" max="600" step="8" value="300" /></div>
    <div class="ctl"><label class="chk"><input type="checkbox" id="bakemoons" /> Bake moons into loop (else live overlay)</label></div>

    <div class="grp">Look</div>
    <div class="ctl"><label>Palette</label>
      <select id="palette">
        <option value="0">Natural</option>
        <option value="1">Game Boy</option>
        <option value="2">Ice duotone</option>
        <option value="3">Sunset</option>
      </select>
    </div>
    <div class="ctl"><label>Dither <b id="dthV">0.70</b></label><input type="range" id="dth" min="0" max="1" step="0.05" value="0.7" /></div>
    <div class="ctl"><label class="chk"><input type="checkbox" id="moons" checked /> Orbiting moons</label></div>
    <div class="ctl"><label class="chk"><input type="checkbox" id="crt" /> CRT / scanlines</label></div>

    <div id="sliders"></div>

    <button class="mini reset" id="reset">↺ reset params to type defaults</button>
  </div>

  <div class="foot">rendered live in <code>planet.wasm</code> — same code as the native generator</div>
</div>

<script type="module">
const NAMES = [
  "terran","ocean","archipelago","desert","swamp","iron","ice","barren",
  "gas giant","ice giant","lava","fungal","savanna","gaia","tundra","alpine",
  "obsidian","chrome","moon","storm giant","ringed giant","molten sea",
  "radioactive","crystal","toxic","storm shroud",
];

// Slider defs in DISPLAY order; `pi` = parameter index into the wasm params array
// (MUST match planet_core::param). `g` starts a new group header.
const PARAMS = [
  { g:"Terrain", pi:0,  label:"Contrast",      min:0.6, max:3.2, step:0.05, fix:2 },
  {             pi:1,  label:"Frequency",     min:1,   max:6,   step:0.1,  fix:1 },
  {             pi:5,  label:"Ice caps",      min:0,   max:1,   step:0.02, fix:2 },
  { g:"Surface", pi:2,  label:"Specular glare",min:0,   max:1,   step:0.02, fix:2 },
  {             pi:3,  label:"Shininess",     min:2,   max:40,  step:1,    fix:0 },
  {             pi:12, label:"Glare ↔ albedo",min:0,   max:1,   step:0.05, fix:2 },
  { g:"Weather", pi:4,  label:"Clouds",        min:0,   max:1,   step:0.02, fix:2 },
  {             pi:9,  label:"Storm cells",   min:0,   max:1,   step:0.02, fix:2 },
  {             pi:8,  label:"Aurora",        min:0,   max:1.5, step:0.02, fix:2 },
  {             pi:7,  label:"Lightning",     min:0,   max:1.5, step:0.02, fix:2 },
  {             pi:6,  label:"Great spot",    min:0,   max:1.5, step:0.02, fix:2 },
  { g:"Gas giant bands", pi:10, label:"Bands", min:3,  max:14,  step:0.5,  fix:1 },
  {             pi:11, label:"Turbulence",    min:0,   max:1.5, step:0.02, fix:2 },
];

const $ = id => document.getElementById(id);
const stage = $("stage");
const sctx = stage.getContext("2d");
sctx.imageSmoothingEnabled = false;
const off = document.createElement("canvas");
const octx = off.getContext("2d");
const moonOff = document.createElement("canvas"); // live moon-layer overlay
const moctx = moonOff.getContext("2d");

const TAU = Math.PI * 2;
let wasm, bufPtr, bufLen, imgData, moonImg, paramsPtr, NUM;
let NATIVE = 64, typeIdx = 0, seed = 1, angle = 0, spin = 0.012;
const sliders = {}; // pi -> { input, val }

// Baking + metrics state. bakeCount is DERIVED from the motion (one frame per
// displayed frame of a rotation), capped by maxBakeFrames for memory.
let baked = false, bakeMoons = false, maxBakeFrames = 300, bakeCount = 48, bakedFrames = null;
const idealFrames = () => Math.round(TAU / Math.max(spin, 1e-4)); // frames the display shows per rotation
let bakeDirty = true, lastChange = 0, bakeTotalMs = 0, liveMsPerFrame = 0;
let emaWork = 0, emaFps = 0, lastRaf = 0, lastMetric = 0;

// Any content change invalidates the baked frames (debounced re-bake).
function markDirty() { bakeDirty = true; lastChange = performance.now(); }

function buildSliders() {
  const host = $("sliders");
  for (const p of PARAMS) {
    if (p.g) { const h = document.createElement("div"); h.className = "grp"; h.textContent = p.g; host.appendChild(h); }
    const wrap = document.createElement("div"); wrap.className = "ctl";
    const lab = document.createElement("label");
    const val = document.createElement("b");
    lab.textContent = p.label + " "; lab.appendChild(val);
    const inp = document.createElement("input");
    inp.type = "range"; inp.min = p.min; inp.max = p.max; inp.step = p.step;
    inp.addEventListener("input", () => { val.textContent = parseFloat(inp.value).toFixed(p.fix); markDirty(); });
    wrap.appendChild(lab); wrap.appendChild(inp); host.appendChild(wrap);
    sliders[p.pi] = { input: inp, val, fix: p.fix };
  }
}

function setResolution(n) {
  NATIVE = n; off.width = off.height = n; moonOff.width = moonOff.height = n;
  imgData = octx.createImageData(n, n); moonImg = octx.createImageData(n, n);
  if (bufPtr) wasm.dealloc(bufPtr, bufLen);
  bufLen = n * n * 4; bufPtr = wasm.alloc(bufLen); $("resV").textContent = n;
  markDirty();
}

function loadTypeDefaults(t) {
  for (const p of PARAMS) {
    const v = wasm.param(t, p.pi);
    sliders[p.pi].input.value = v;
    sliders[p.pi].val.textContent = v.toFixed(p.fix);
  }
  markDirty();
}

function setType(t) {
  typeIdx = t; $("type").value = String(t);
  $("name").textContent = NAMES[t] ?? `type ${t}`;
  $("sub").textContent = `seed ${seed} · type ${t}`;
  loadTypeDefaults(t);
}

function randomize() {
  seed = (Math.random() * 0xffffff) >>> 0; $("seed").value = seed;
  setType(Math.floor(Math.random() * NAMES.length));
}

// Write current slider values into the wasm params buffer; return style args.
function pushParams() {
  const pv = new Float32Array(wasm.memory.buffer, paramsPtr, NUM);
  for (const p of PARAMS) pv[p.pi] = parseFloat(sliders[p.pi].input.value);
  return [parseInt($("palette").value), parseFloat($("dth").value), $("moons").checked ? 1 : 0];
}

// Render one frame at `a` and copy it out as a standalone ImageData (a "sprite").
function renderToImageData(a) {
  const [pal, dith, mn] = pushParams();
  wasm.render_styled(bufPtr, NATIVE, typeIdx, seed, a, paramsPtr, pal, dith, mn);
  const view = new Uint8Array(wasm.memory.buffer, bufPtr, bufLen);
  return new ImageData(new Uint8ClampedArray(view), NATIVE, NATIVE);
}

// Pre-render the whole rotation loop once (the BODY: surface + weather + rings,
// moons only if they're being baked). Playback then just blits these.
function bake() {
  const start = performance.now();
  // One baked frame per displayed frame of a rotation (2π/spin), capped for memory.
  bakeCount = Math.max(24, Math.min(maxBakeFrames, idealFrames()));
  const [pal, dith] = pushParams();
  const mnBake = (bakeMoons && $("moons").checked) ? 1 : 0;
  bakedFrames = new Array(bakeCount);
  for (let i = 0; i < bakeCount; i++) {
    wasm.render_styled(bufPtr, NATIVE, typeIdx, seed, TAU * i / bakeCount, paramsPtr, pal, dith, mnBake);
    const view = new Uint8Array(wasm.memory.buffer, bufPtr, bufLen);
    bakedFrames[i] = new ImageData(new Uint8ClampedArray(view), NATIVE, NATIVE);
  }
  bakeTotalMs = performance.now() - start;
  liveMsPerFrame = bakeTotalMs / bakeCount;
}

function frame(ts) {
  if (lastRaf) { const f = 1000 / (ts - lastRaf); emaFps = emaFps ? emaFps * 0.9 + f * 0.1 : f; }
  lastRaf = ts;
  angle += spin;

  // Re-bake shortly after the last change (so dragging sliders doesn't thrash).
  if (baked && bakeDirty && performance.now() - lastChange > 120) { bake(); bakeDirty = false; }

  const t0 = performance.now(); // time only the per-frame draw work
  if (baked) {
    if (bakedFrames) {
      const N = bakedFrames.length;
      const phase = ((angle % TAU) + TAU) % TAU;
      const fi = Math.floor(phase / TAU * N) % N;
      octx.putImageData(bakedFrames[fi], 0, 0); // blit the baked body
      // Moons orbit independently of the spin, so render them live and
      // composite over the baked body (unless they were baked in).
      if (!bakeMoons && $("moons").checked) {
        wasm.render_moons(bufPtr, NATIVE, typeIdx, seed, angle, parseInt($("palette").value), parseFloat($("dth").value));
        moonImg.data.set(new Uint8Array(wasm.memory.buffer, bufPtr, bufLen));
        moctx.putImageData(moonImg, 0, 0);
        octx.drawImage(moonOff, 0, 0); // alpha-composite the moon layer
      }
    }
  } else {
    const [pal, dith, mn] = pushParams();
    wasm.render_styled(bufPtr, NATIVE, typeIdx, seed, angle, paramsPtr, pal, dith, mn);
    imgData.data.set(new Uint8Array(wasm.memory.buffer, bufPtr, bufLen));
    octx.putImageData(imgData, 0, 0);
  }
  sctx.clearRect(0, 0, stage.width, stage.height);
  sctx.drawImage(off, 0, 0, stage.width, stage.height);
  const work = performance.now() - t0;
  emaWork = emaWork ? emaWork * 0.9 + work * 0.1 : work;

  if (ts - lastMetric > 150) { updateMetrics(); lastMetric = ts; }
  requestAnimationFrame(frame);
}

function updateMetrics() {
  const fps = emaFps.toFixed(0).padStart(4);
  const work = emaWork.toFixed(3).padStart(6);
  const line = "──────────────────────────";
  let txt;
  if (baked) {
    const mem = (bakeCount * NATIVE * NATIVE * 4 / 1048576).toFixed(2);
    const speed = liveMsPerFrame > 0 ? (liveMsPerFrame / Math.max(emaWork, 1e-4)).toFixed(0) : "–";
    const moonMode = (!bakeMoons && $("moons").checked) ? "live overlay" : (bakeMoons ? "baked in" : "off");
    txt =
`mode        baked body + blit
fps        ${fps}
draw      ${work} ms / frame
${line}
baked       ${bakeCount}/${idealFrames()} frames  (${NATIVE}px)
smoothness  ${bakeCount >= idealFrames() ? "1:1 (smooth)" : "capped (raise cap)"}
moons       ${moonMode}
bake cost   ${bakeTotalMs.toFixed(0)} ms  once
live cost   ${liveMsPerFrame.toFixed(3)} ms / frame
memory      ${mem} MB
speedup     ${speed}× cheaper / frame`;
  } else {
    txt =
`mode        live (full render)
fps        ${fps}
render    ${work} ms / frame
${line}
every frame recomputes
every pixel in wasm.
"Bake" caches the body
loop; moons stay live.`;
  }
  $("metrics").textContent = txt;
}

async function main() {
  const res = await fetch("./planet.wasm?v=" + Date.now(), { cache: "no-store" });
  const { instance } = await WebAssembly.instantiate(await res.arrayBuffer(), {});
  wasm = instance.exports;

  const n = wasm.type_count();
  if (n !== NAMES.length) $("sub").textContent = `warning: wasm has ${n} types, JS lists ${NAMES.length}`;
  NUM = wasm.num_params();

  NAMES.forEach((name, i) => { const o = document.createElement("option"); o.value = String(i); o.textContent = name; $("type").appendChild(o); });
  buildSliders();

  paramsPtr = wasm.alloc(NUM * 4); // stable buffer, allocated before pixel buffer
  setResolution(64);
  randomize();

  $("type").addEventListener("change", () => setType(parseInt($("type").value)));
  $("seed").addEventListener("input", () => { seed = (parseInt($("seed").value) || 0) >>> 0; $("sub").textContent = `seed ${seed} · type ${typeIdx}`; markDirty(); });
  $("rndseed").addEventListener("click", () => { seed = (Math.random() * 0xffffff) >>> 0; $("seed").value = seed; markDirty(); });
  $("gen").addEventListener("click", randomize);
  $("reset").addEventListener("click", () => loadTypeDefaults(typeIdx));
  $("res").addEventListener("input", () => setResolution(parseInt($("res").value)));
  $("spn").addEventListener("input", () => { spin = parseFloat($("spn").value); $("spnV").textContent = spin.toFixed(3); markDirty(); });
  $("dth").addEventListener("input", () => { $("dthV").textContent = parseFloat($("dth").value).toFixed(2); markDirty(); });
  $("palette").addEventListener("change", markDirty);
  $("moons").addEventListener("change", markDirty);
  $("crt").addEventListener("change", () => $("crtfx").classList.toggle("on", $("crt").checked));
  $("baked").addEventListener("change", () => { baked = $("baked").checked; markDirty(); });
  $("bakemoons").addEventListener("change", () => { bakeMoons = $("bakemoons").checked; markDirty(); });
  $("bkf").addEventListener("input", () => { maxBakeFrames = parseInt($("bkf").value); $("bkfV").textContent = maxBakeFrames; markDirty(); });

  requestAnimationFrame(frame);
}
main().catch(e => { $("name").textContent = "failed to load wasm"; $("sub").textContent = String(e); });
</script>
</body>
</html>
