<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Procedural Star — Rust · WASM</title>
<style>
  :root { color-scheme: dark; }
  html, body {
    margin: 0; min-height: 100%;
    background: radial-gradient(circle at 50% 18%, #12131f 0%, #06060c 70%);
    color: #d7dae6;
    font: 15px/1.5 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  }
  .app { max-width: 880px; margin: 0 auto; padding: 28px 20px 48px;
         display: flex; flex-wrap: wrap; gap: 28px; align-items: flex-start; justify-content: center; }
  h1 { font-size: 14px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase;
       color: #7f86a3; margin: 0 0 14px; }
  .left { text-align: center; position: sticky; top: 20px; }
  .stage {
    width: 360px; height: 360px; max-width: 82vw; max-height: 82vw;
    border-radius: 14px; background: #000;
    box-shadow: 0 10px 40px rgba(0,0,0,.6), inset 0 0 0 1px rgba(255,255,255,.05);
    display: block; image-rendering: pixelated;
  }
  .name { font-size: 20px; font-weight: 700; color: #eef1f8; text-transform: capitalize; margin-top: 16px; }
  .sub { font-size: 12px; color: #6b7290; letter-spacing: .04em; }
  .gen { margin-top: 14px; padding: 11px 22px; font: inherit; font-weight: 600;
    color: #06060c; background: linear-gradient(180deg, #ffe8b0, #f4b74a);
    border: 0; border-radius: 999px; cursor: pointer; box-shadow: 0 4px 14px rgba(0,0,0,.4); }
  .gen:active { transform: translateY(1px); }

  .panel { width: 340px; background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06);
           border-radius: 14px; padding: 16px 18px 20px; }
  .panel h2 { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: #7f86a3; margin: 0 0 12px; }
  .grp { font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: #565d78;
         margin: 16px 0 8px; border-top: 1px solid rgba(255,255,255,.06); padding-top: 12px; }
  .ctl { margin: 0 0 11px; }
  .ctl label { display: flex; justify-content: space-between; font-size: 12px; color: #9aa0bb; margin-bottom: 4px; }
  .ctl label b { color: #eef1f8; font-variant-numeric: tabular-nums; font-weight: 600; }
  input[type=range] { width: 100%; accent-color: #f4b74a; cursor: pointer; }
  select, input[type=number] { width: 100%; box-sizing: border-box; padding: 8px 10px; font: inherit; font-size: 13px;
    color: #eef1f8; background: #0e0f18; border: 1px solid rgba(255,255,255,.1); border-radius: 8px; }
  .rowflex { display: flex; gap: 8px; } .rowflex input { flex: 1; }
  .mini { padding: 8px 12px; font: inherit; color: #d7dae6; background: #171826;
    border: 1px solid rgba(255,255,255,.1); border-radius: 8px; cursor: pointer; }
  .mini:active { transform: translateY(1px); }
  .reset { width: 100%; margin-top: 12px; }
  .foot { width: 100%; text-align: center; font-size: 11px; color: #4d536b; letter-spacing: .05em; }
  .foot code { color: #6b7290; }
  .stage-wrap { position: relative; display: inline-block; }
  .crt { position: absolute; inset: 0; border-radius: 14px; pointer-events: none; opacity: 0;
    transition: opacity .2s; mix-blend-mode: multiply;
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,.32) 0, rgba(0,0,0,.32) 1px, transparent 2px, transparent 3px),
      radial-gradient(circle at 50% 50%, transparent 55%, rgba(0,0,0,.5) 100%); }
  .crt.on { opacity: 1; }
  .chk { justify-content: flex-start !important; gap: 8px; cursor: pointer; color: #cfd4e6 !important; }
  .chk input { accent-color: #f4b74a; }
</style>
</head>
<body>
<div class="app">
  <div class="left">
    <h1>Procedural Star</h1>
    <div class="stage-wrap">
      <canvas class="stage" id="stage" width="360" height="360"></canvas>
      <div class="crt" id="crtfx"></div>
    </div>
    <div class="name" id="name">loading…</div>
    <div class="sub" id="sub">Rust → WebAssembly · live boiling photosphere</div>
    <button class="gen" id="gen">✦ Generate random</button>
  </div>

  <div class="panel">
    <h2>Controls</h2>
    <div class="ctl"><label>Type</label><select id="type"></select></div>
    <div class="ctl"><label>Seed</label>
      <div class="rowflex"><input type="number" id="seed" min="0" value="1" /><button class="mini" id="rndseed" title="random seed">🎲</button></div>
    </div>
    <div class="ctl"><label>Resolution <b id="resV">80</b></label><input type="range" id="res" min="48" max="240" step="8" value="80" /></div>
    <div class="ctl"><label>Boil speed <b id="spdV">0.030</b></label><input type="range" id="spd" min="0" max="0.10" step="0.002" value="0.03" /></div>
    <div class="ctl"><label>Rotation <b id="rotV">0.00</b></label><input type="range" id="rot" min="0" max="1" step="0.05" value="0" /></div>

    <div id="sliders"></div>

    <div class="grp">Look</div>
    <div class="ctl"><label>Dither <b id="dthV">0.70</b></label><input type="range" id="dth" min="0" max="1" step="0.05" value="0.7" /></div>
    <div class="ctl"><label class="chk"><input type="checkbox" id="crt" /> CRT / scanlines</label></div>

    <button class="mini reset" id="reset">↺ reset params to type defaults</button>
  </div>

  <div class="foot">rendered live in <code>star.wasm</code> — same code as the native generator</div>
</div>

<script type="module">
const NAMES = [
  "blue giant","white star","yellow dwarf","orange dwarf",
  "red giant","red dwarf","white dwarf","sol",
];

// Slider defs in DISPLAY order; `pi` = parameter index into the wasm params array
// (MUST match star::param). `g` starts a new group header.
const PARAMS = [
  { g:"Surface", pi:0, label:"Granulation",  min:3,   max:12,  step:0.5,  fix:1 },
  {              pi:1, label:"Turbulence",   min:0,   max:1.5, step:0.05, fix:2 },
  {              pi:2, label:"Sunspots",     min:0,   max:1,   step:0.05, fix:2 },
  { g:"Corona & flares", pi:3, label:"Prominences", min:0, max:1.5, step:0.05, fix:2 },
  {              pi:4, label:"Flares (spikes)", min:0, max:1.5, step:0.05, fix:2 },
  {              pi:5, label:"Corona reach", min:0.4, max:2,   step:0.05, fix:2 },
  {              pi:6, label:"Fur density",  min:0.5, max:2,   step:0.05, fix:2 },
];

const $ = id => document.getElementById(id);
const stage = $("stage");
const sctx = stage.getContext("2d");
sctx.imageSmoothingEnabled = false;
const off = document.createElement("canvas");
const octx = off.getContext("2d");

let wasm, bufPtr, bufLen, imgData, paramsPtr, NUM;
let NATIVE = 80, typeIdx = 0, seed = 1, angle = 0, speed = 0.03, spin = 0;
const sliders = {}; // pi -> { input, val }

function buildSliders() {
  const host = $("sliders");
  for (const p of PARAMS) {
    if (p.g) { const h = document.createElement("div"); h.className = "grp"; h.textContent = p.g; host.appendChild(h); }
    const wrap = document.createElement("div"); wrap.className = "ctl";
    const lab = document.createElement("label");
    const val = document.createElement("b");
    lab.textContent = p.label + " "; lab.appendChild(val);
    const inp = document.createElement("input");
    inp.type = "range"; inp.min = p.min; inp.max = p.max; inp.step = p.step;
    inp.addEventListener("input", () => val.textContent = parseFloat(inp.value).toFixed(p.fix));
    wrap.appendChild(lab); wrap.appendChild(inp); host.appendChild(wrap);
    sliders[p.pi] = { input: inp, val, fix: p.fix };
  }
}

function setResolution(n) {
  NATIVE = n; off.width = off.height = n; imgData = octx.createImageData(n, n);
  if (bufPtr) wasm.dealloc(bufPtr, bufLen);
  bufLen = n * n * 4; bufPtr = wasm.alloc(bufLen); $("resV").textContent = n;
}

function loadTypeDefaults(t) {
  for (const p of PARAMS) {
    const v = wasm.param(t, p.pi);
    sliders[p.pi].input.value = v;
    sliders[p.pi].val.textContent = v.toFixed(p.fix);
  }
}

function setType(t) {
  typeIdx = t; $("type").value = String(t);
  $("name").textContent = NAMES[t] ?? `type ${t}`;
  $("sub").textContent = `seed ${seed} · type ${t}`;
  loadTypeDefaults(t);
}

function randomize() {
  seed = (Math.random() * 0xffffff) >>> 0; $("seed").value = seed;
  setType(Math.floor(Math.random() * NAMES.length));
}

function frame() {
  angle += speed;
  const pv = new Float32Array(wasm.memory.buffer, paramsPtr, NUM);
  for (const p of PARAMS) pv[p.pi] = parseFloat(sliders[p.pi].input.value);
  const dither = parseFloat($("dth").value);
  wasm.render_params(bufPtr, NATIVE, typeIdx, seed, angle, paramsPtr, dither, spin);
  const view = new Uint8Array(wasm.memory.buffer, bufPtr, bufLen);
  imgData.data.set(view);
  octx.putImageData(imgData, 0, 0);
  sctx.clearRect(0, 0, stage.width, stage.height);
  sctx.drawImage(off, 0, 0, stage.width, stage.height);
  requestAnimationFrame(frame);
}

async function main() {
  const res = await fetch("./star.wasm?v=" + Date.now(), { cache: "no-store" });
  const { instance } = await WebAssembly.instantiate(await res.arrayBuffer(), {});
  wasm = instance.exports;

  const n = wasm.type_count();
  if (n !== NAMES.length) $("sub").textContent = `warning: wasm has ${n} types, JS lists ${NAMES.length}`;
  NUM = wasm.num_params();

  NAMES.forEach((name, i) => { const o = document.createElement("option"); o.value = String(i); o.textContent = name; $("type").appendChild(o); });
  buildSliders();

  paramsPtr = wasm.alloc(NUM * 4); // stable buffer, allocated before pixel buffer
  setResolution(80);
  randomize();

  $("type").addEventListener("change", () => setType(parseInt($("type").value)));
  $("seed").addEventListener("input", () => { seed = (parseInt($("seed").value) || 0) >>> 0; $("sub").textContent = `seed ${seed} · type ${typeIdx}`; });
  $("rndseed").addEventListener("click", () => { seed = (Math.random() * 0xffffff) >>> 0; $("seed").value = seed; });
  $("gen").addEventListener("click", randomize);
  $("reset").addEventListener("click", () => loadTypeDefaults(typeIdx));
  $("res").addEventListener("input", () => setResolution(parseInt($("res").value)));
  $("spd").addEventListener("input", () => { speed = parseFloat($("spd").value); $("spdV").textContent = speed.toFixed(3); });
  $("rot").addEventListener("input", () => { spin = parseFloat($("rot").value); $("rotV").textContent = spin.toFixed(2); });
  $("dth").addEventListener("input", () => $("dthV").textContent = parseFloat($("dth").value).toFixed(2));
  $("crt").addEventListener("change", () => $("crtfx").classList.toggle("on", $("crt").checked));

  requestAnimationFrame(frame);
}
main().catch(e => { $("name").textContent = "failed to load wasm"; $("sub").textContent = String(e); });
</script>
</body>
</html>
