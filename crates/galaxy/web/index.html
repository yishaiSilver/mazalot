<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Procedural Galaxy — Rust · WASM</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #04050a;
    color: #d7dae6; font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    position: fixed; width: 100%; overscroll-behavior: none; touch-action: none;
    -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
  #stage { position: fixed; inset: 0; width: 100%; height: 100%; display: block;
    cursor: grab; touch-action: none; background: #04050a;
    image-rendering: pixelated; image-rendering: crisp-edges; }
  #stage.drag { cursor: grabbing; }
  #stage.pick { cursor: pointer; }

  .hud { position: fixed; pointer-events: none; z-index: 5; text-shadow: 0 1px 3px rgba(0,0,0,.9); }
  .topleft { top: 18px; left: 20px; }
  .topleft h1 { margin: 0; font-size: 12px; font-weight: 600; letter-spacing: .16em;
    text-transform: uppercase; color: #8790ad; }
  .viewing { margin-top: 8px; font-size: 22px; font-weight: 700; color: #eef1f8; text-transform: capitalize; min-height: 28px; }
  .viewing small { display: block; font-size: 12px; font-weight: 500; letter-spacing: .04em;
    color: #7b83a2; text-transform: none; margin-top: 2px; }
  .hint { position: fixed; top: 18px; right: 20px; z-index: 5; pointer-events: none;
    font-size: 12px; color: #6b7290; text-align: right; text-shadow: 0 1px 3px rgba(0,0,0,.9); letter-spacing: .03em; }
  .hint b { color: #aeb4cd; font-weight: 600; }

  /* Hover tooltip that follows the cursor over the map. */
  .tip { position: fixed; z-index: 7; pointer-events: none; display: none;
    padding: 5px 9px; border-radius: 8px; font-size: 12px; white-space: nowrap;
    background: rgba(10,11,20,.92); border: 1px solid rgba(255,255,255,.12);
    box-shadow: 0 6px 20px rgba(0,0,0,.5); transform: translate(-50%, calc(-100% - 12px)); }
  .tip b { color: #eef1f8; } .tip i { font-style: normal; color: #8790ad; }

  /* System info panel — shown when a system is selected on the map. */
  .panel { position: fixed; left: 16px; bottom: 16px; z-index: 6; width: 260px;
    max-width: calc(100vw - 32px); display: none;
    background: rgba(14,15,24,.9); border: 1px solid rgba(255,255,255,.09);
    border-radius: 14px; box-shadow: 0 10px 40px rgba(0,0,0,.6); backdrop-filter: blur(9px);
    padding: 15px 16px 16px; }
  .panel.show { display: block; }
  .panel .pname { font-size: 20px; font-weight: 800; color: #eef1f8; margin: 0 0 2px; }
  .panel .pcoord { font-size: 11px; color: #6b7290; letter-spacing: .05em; margin-bottom: 12px; }
  .panel .prow { display: flex; align-items: center; justify-content: space-between; font-size: 13px;
    padding: 4px 0; border-top: 1px solid rgba(255,255,255,.06); }
  .panel .prow span { color: #9aa0bb; } .panel .prow b { color: #eef1f8; font-weight: 600; }
  .swatch { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  .panel button.enter { width: 100%; margin-top: 14px; padding: 10px 12px; font: inherit; font-size: 14px;
    font-weight: 700; color: #06060c; border: 0; border-radius: 9px; cursor: pointer;
    background: linear-gradient(180deg, #ffe8b0, #f4b74a); }
  .panel button.enter:active { transform: translateY(1px); }

  .backbtn { position: fixed; top: 16px; left: 20px; z-index: 6; display: none;
    padding: 8px 14px; font: inherit; font-size: 13px; font-weight: 600; color: #d7dae6;
    background: rgba(20,22,34,.9); border: 1px solid rgba(255,255,255,.14); border-radius: 9px;
    cursor: pointer; backdrop-filter: blur(6px); }
  .backbtn:hover { background: rgba(30,33,50,.95); }
  .backbtn.show { display: block; }

  /* Control dock — map generation controls, docked bottom-right. */
  .dock { position: fixed; right: 16px; bottom: 16px; z-index: 6; width: 262px;
    max-width: calc(100vw - 32px);
    background: rgba(14,15,24,.86); border: 1px solid rgba(255,255,255,.08);
    border-radius: 14px; box-shadow: 0 10px 40px rgba(0,0,0,.6); backdrop-filter: blur(9px); }
  .dock.hidden { display: none; }
  .dock-head { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; cursor: pointer; user-select: none; }
  .dock-head span { font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: #8790ad; }
  .dock-head .chev { color: #8790ad; transition: transform .18s; }
  .dock.collapsed .chev { transform: rotate(180deg); }
  .dock-body { max-height: min(64vh, 560px); overflow-y: auto; overscroll-behavior: contain; padding: 2px 14px 14px; }
  .dock.collapsed .dock-body { display: none; }

  .row { display: flex; gap: 8px; align-items: center; }
  .row input[type=number] { flex: 1; }
  .grp { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: #565d78;
    margin: 15px 0 8px; border-top: 1px solid rgba(255,255,255,.07); padding-top: 11px; }
  .ctl { margin: 0 0 10px; }
  .ctl label { display: flex; justify-content: space-between; font-size: 12px; color: #9aa0bb; margin-bottom: 4px; }
  .ctl label b { color: #eef1f8; font-variant-numeric: tabular-nums; font-weight: 600; }
  input[type=number] { width: 100%; box-sizing: border-box; padding: 8px 9px; font: inherit; font-size: 13px;
    color: #eef1f8; background: #0e0f18; border: 1px solid rgba(255,255,255,.12); border-radius: 8px; }
  input[type=range] { width: 100%; accent-color: #f4b74a; cursor: pointer; }
  button { padding: 8px 12px; font: inherit; font-size: 13px; color: #d7dae6; background: #1a1c2b;
    border: 1px solid rgba(255,255,255,.12); border-radius: 8px; cursor: pointer; white-space: nowrap; }
  button:hover { background: #23263a; } button:active { transform: translateY(1px); }
  button.primary { color: #06060c; font-weight: 700; border: 0; background: linear-gradient(180deg, #ffe8b0, #f4b74a); }
  button.wide { width: 100%; margin-top: 14px; }
  .err { position: fixed; inset: 0; display: none; place-items: center; text-align: center; color: #ff9a9a; padding: 40px; z-index: 10; }

  @media (max-width: 700px), (pointer: coarse) {
    .topleft { top: 10px; left: 12px; } .topleft h1 { font-size: 10px; letter-spacing: .12em; }
    .viewing { font-size: 17px; margin-top: 5px; min-height: 22px; } .viewing small { font-size: 11px; }
    .hint { display: none; }
    .dock { left: 10px; right: 10px; bottom: calc(10px + env(safe-area-inset-bottom)); width: auto; }
    .dock-body { max-height: 42vh; }
    .panel { left: 10px; right: 10px; bottom: calc(10px + env(safe-area-inset-bottom)); width: auto; }
    .backbtn { top: 10px; left: 12px; }
  }
</style>
</head>
<body>
<canvas id="stage"></canvas>

<div class="hud topleft">
  <h1 id="ctxTitle">Procedural Galaxy</h1>
  <div class="viewing" id="viewing">loading…<small id="sysinfo">Rust → WebAssembly</small></div>
</div>
<div class="hint" id="hint">
  <b>drag</b> to pan · <b>scroll / pinch</b> to zoom<br><b>click a star</b> to inspect · <b>double-click</b> to enter
</div>

<button class="backbtn" id="back">← Galaxy</button>

<div class="tip" id="tip"></div>

<div class="panel" id="panel">
  <div class="pname" id="panelName">—</div>
  <div class="pcoord" id="panelCoord"></div>
  <div class="prow"><span>Faction</span><b id="panelFaction">—</b></div>
  <div class="prow"><span>Star</span><b id="panelStar">—</b></div>
  <div class="prow"><span>Hyperlanes</span><b id="panelLinks">—</b></div>
  <div class="prow"><span>System seed</span><b id="panelSeed">—</b></div>
  <button class="enter" id="enter">Enter system ▶</button>
</div>

<div class="dock" id="dock">
  <div class="dock-head" id="dockHead"><span>Galaxy</span><span class="chev">▾</span></div>
  <div class="dock-body">
    <div class="row">
      <input type="number" id="seed" min="0" value="7" title="seed" />
      <button id="dice" title="random seed">🎲</button>
      <button class="primary" id="gen">✦ Generate</button>
    </div>
    <div class="grp">Structure</div>
    <div class="ctl"><label>Systems <b id="countV">—</b></label><input type="range" id="count" min="40" max="500" step="10" value="0" /></div>
    <div class="ctl"><label>Hyperlane density <b id="linkV">0.35</b></label><input type="range" id="link" min="0" max="1" step="0.05" value="0.35" /></div>
    <div class="ctl"><label>Spiral arms <b id="armsV">auto</b></label><input type="range" id="arms" min="0" max="6" step="1" value="0" /></div>
    <div class="grp">Look</div>
    <div class="ctl"><label>Star size <b id="nsizeV">1.00×</b></label><input type="range" id="nsize" min="0.4" max="2.5" step="0.05" value="1" /></div>
    <div class="ctl"><label>Nebula haze <b id="hazeV">1.00×</b></label><input type="range" id="haze" min="0" max="2.5" step="0.05" value="1" /></div>
    <button class="wide" id="fit">⤢ Reset view</button>
  </div>
</div>

<div class="err" id="err"></div>

<script type="module">
// ---- names index-aligned with the Rust tables (galaxy REGIONS / SUN_TINT,
//      solar SUNS). Keep in sync. ---------------------------------------------
const SUN_NAMES = ["yellow dwarf","orange dwarf","red giant","white star","blue giant"];
const REGION_NAMES = ["Republic","Syndicate","Free Worlds","Verge","Concord","Reach","Expanse","Drift"];
const REGION_RGB = ["102,158,255","255,168,76","107,230,184","204,117,245","250,209,102","245,112,143","112,199,250","184,189,209"];

// ---- procedural, deterministic system name from a seed (display only; the
//      canonical identity is the numeric seed). ---------------------------------
function rngFrom(seed) {
  let s = seed >>> 0;
  return () => { s = (s + 0x6D2B79F5) >>> 0; let t = s; t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61); return ((t ^ (t >>> 14)) >>> 0) / 4294967296; };
}
const ON = ["b","c","d","f","g","h","k","l","m","n","p","r","s","t","v","z","br","dr","kr","th","st","tr","vh","zy","xa","ph","sh","cor","tal","vel","ast"];
const NU = ["a","e","i","o","u","ae","ei","ia","ou","y","ea"];
const CO = ["","n","r","s","l","x","th","rn","k","m","ss","nd"];
function systemName(seed) {
  const r = rngFrom(seed ^ 0x51ede1);
  const syl = 2 + (r() < 0.4 ? 1 : 0);
  let s = "";
  for (let i = 0; i < syl; i++) {
    s += ON[(r() * ON.length) | 0] + NU[(r() * NU.length) | 0] + CO[(r() * CO.length) | 0];
  }
  s = s.charAt(0).toUpperCase() + s.slice(1);
  if (r() < 0.28) { // ~a quarter get a catalog designation
    const gk = ["Tau","Eta","Rho","Nu","Xi","Zeta","Kai"][(r() * 7) | 0];
    s = `${gk} ${s}-${1 + ((r() * 9) | 0)}`;
  }
  return s;
}

const $ = id => document.getElementById(id);
const canvas = $("stage"), ctx = canvas.getContext("2d", { alpha: false });
ctx.imageSmoothingEnabled = false;
const off = document.createElement("canvas"), octx = off.getContext("2d");

// ---- two WASM modules: the galaxy map, and solar for the drill-down view. ----
let G, S;                       // exports of galaxy.wasm, solar.wasm
let gal = 0, sys = 0;           // opaque pointers
// Scratch f32[2] pointers — one PER module, since each writes into its OWN
// linear memory (posPtr in G's memory for node_pos; sPosPtr in S's for planet_pos).
let gBuf = 0, gBufLen = 0, sBuf = 0, sBufLen = 0, posPtr = 0, sPosPtr = 0;
let imgData, curW = 0, curH = 0;

let mode = "map";               // "map" | "system"
// Two cameras (world point at viewport centre; zoom = CSS px per world unit).
let camMap = { x: 0, y: 0, zoom: 0.4 };
let camSys = { x: 0, y: 0, zoom: 1 };
const cam = () => (mode === "map" ? camMap : camSys);

// --- map state ---
let seed = 7, nSystems = 0, selNode = -1, hoverNode = -1;
let vCount = 0, vLink = 0.35, vArms = 0, vNsize = 1, vHaze = 1;
let tMap = 0;

// --- system (solar) state, mirrors the solar demo ---
let nPlanets = 0, sunKindS = 0, planetKinds = [], follow = -1;
let tOrbit = 0, tSpin = 0, tSun = 0;
let sysSeed = 0, sysNode = -1;
let bgPanX = 0, bgPanY = 0, camPrevX = 0, camPrevY = 0, bgResync = true;
const PLANET_NAMES = ["terran","ocean","jungle","desert","barren","lava","ice","gas giant","ice giant","ringed giant"];

let last = performance.now();
const coarse = window.matchMedia("(pointer: coarse)").matches;
const PIXEL_BUDGET = coarse ? 480_000 : 1_800_000;

function setupCanvas() {
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  canvas.style.width = window.innerWidth + "px"; canvas.style.height = window.innerHeight + "px";
  ctx.imageSmoothingEnabled = false;
}

// Render buffer sized to the display (pix = 1, crisp), capped by the budget.
function computeRender() {
  const cssW = canvas.width, cssH = canvas.height;
  let w = cssW, h = cssH;
  const bs = Math.min(1, Math.sqrt(PIXEL_BUDGET / (w * h)));
  w = Math.round(w * bs); h = Math.round(h * bs);
  w = Math.max(16, w - (w % 8)); h = Math.max(12, h - (h % 8));
  return { w, h, zoomArg: w * cam().zoom / cssW };
}

// ============================ GALAXY MAP =====================================
function buildGalaxy() {
  if (gal) G.galaxy_free(gal);
  gal = G.galaxy_new_params(seed, vCount | 0, vLink, vArms | 0);
  nSystems = G.node_count(gal);
  G.galaxy_set_view(gal, vNsize, vHaze);
  $("countV").textContent = nSystems;
  const name = systemName(seed ^ 0xA11);
  $("ctxTitle").textContent = "Procedural Galaxy";
  $("viewing").firstChild.textContent = `Sector ${name} `;
  $("sysinfo").textContent = `${nSystems} systems · seed ${seed}`;
  selNode = -1; hoverNode = -1; $("panel").classList.remove("show");
}
function fitMap() {
  const ext = G.galaxy_extent(gal);
  camMap = { x: 0, y: 0, zoom: Math.min(0.46 * canvas.width / ext, 0.46 * canvas.height / (ext * INCLINE)) };
}
function generateGalaxy(s) {
  seed = s >>> 0; $("seed").value = seed;
  buildGalaxy(); fitMap(); tMap = 0;
}
function selectNode(i) {
  selNode = i;
  const p = $("panel");
  if (i < 0) { p.classList.remove("show"); return; }
  G.node_pos(gal, i, posPtr);
  const pos = new Float32Array(G.memory.buffer, posPtr, 2);
  const nseed = G.node_seed(gal, i) >>> 0;
  const region = G.node_region(gal, i), star = G.node_star(gal, i), deg = G.node_degree(gal, i);
  $("panelName").textContent = systemName(nseed);
  $("panelCoord").textContent = `◈ ${pos[0].toFixed(0)}, ${pos[1].toFixed(0)}`;
  $("panelFaction").innerHTML = `<span class="swatch" style="background:rgb(${REGION_RGB[region] || "180,180,180"})"></span>${REGION_NAMES[region] || "unknown"}`;
  $("panelStar").textContent = SUN_NAMES[star] || "star";
  $("panelLinks").textContent = deg;
  $("panelSeed").textContent = nseed;
  p.classList.add("show");
}

// ============================ SYSTEM (solar) =================================
function enterSystem(i) {
  if (i < 0) return;
  sysNode = i; sysSeed = G.node_seed(gal, i) >>> 0;
  if (sys) S.system_free(sys);
  sys = S.system_new(sysSeed);
  nPlanets = S.planet_count(sys); sunKindS = S.sun_kind_of(sys);
  planetKinds = [];
  for (let k = 0; k < nPlanets; k++) planetKinds.push(S.planet_kind_at(sys, k));
  // Fit the solar camera (orbits are vertically squashed ~0.42).
  const ext = S.system_extent(sys);
  camSys = { x: 0, y: 0, zoom: Math.min(0.45 * canvas.width / ext, 0.45 * canvas.height / (ext * 0.55)) };
  follow = -1; tOrbit = tSpin = tSun = 0; bgPanX = bgPanY = 0; bgResync = true;
  mode = "system";
  $("dock").classList.add("hidden"); $("panel").classList.remove("show");
  $("back").classList.add("show"); $("hint").innerHTML = "<b>drag</b> to pan · <b>scroll / pinch</b> to zoom<br><b>tap a planet</b> to follow it";
  $("ctxTitle").textContent = "System · " + systemName(sysSeed);
}
function exitSystem() {
  mode = "map";
  $("dock").classList.remove("hidden"); $("back").classList.remove("show");
  $("hint").innerHTML = "<b>drag</b> to pan · <b>scroll / pinch</b> to zoom<br><b>click a star</b> to inspect · <b>double-click</b> to enter";
  $("ctxTitle").textContent = "Procedural Galaxy";
  $("viewing").firstChild.textContent = `Sector ${systemName(seed ^ 0xA11)} `;
  selectNode(sysNode); // reopen the panel on the system we just left
}

// ================================ FRAME ======================================
function frame(now) {
  const dt = Math.min(0.05, (now - last) / 1000); last = now;
  const { w, h, zoomArg } = computeRender();
  if (w !== curW || h !== curH) { curW = w; curH = h; off.width = w; off.height = h; imgData = octx.createImageData(w, h); }

  if (mode === "map") {
    tMap += dt;
    G.render_map(gal, gBuf, w, h, camMap.x, camMap.y, zoomArg, tMap, selNode, hoverNode);
    imgData.data.set(new Uint8Array(G.memory.buffer, gBuf, w * h * 4));
  } else {
    tOrbit += dt; tSpin += dt; tSun += dt;
    if (follow >= 0 && follow < nPlanets) {
      S.planet_pos(sys, follow, tOrbit, sPosPtr);
      const p = new Float32Array(S.memory.buffer, sPosPtr, 2); camSys.x = p[0]; camSys.y = p[1];
    }
    if (bgResync) { camPrevX = camSys.x; camPrevY = camSys.y; bgResync = false; }
    bgPanX += (camSys.x - camPrevX) * camSys.zoom; bgPanY += (camSys.y - camPrevY) * camSys.zoom;
    camPrevX = camSys.x; camPrevY = camSys.y;
    S.render_t(sys, sBuf, w, h, camSys.x, camSys.y, zoomArg, bgPanX, bgPanY, tOrbit, tSpin, tSun);
    imgData.data.set(new Uint8Array(S.memory.buffer, sBuf, w * h * 4));
    // HUD: what's under the crosshair?
    const near = follow >= 0 ? follow : S.nearest_center(sys, w, h, camSys.x, camSys.y, zoomArg, tOrbit);
    const kind = near >= 0 ? (PLANET_NAMES[planetKinds[near]] || "planet") : (SUN_NAMES[sunKindS] || "the star");
    $("viewing").firstChild.textContent = (follow >= 0 ? "◎ following " : "") + kind + " ";
  }
  octx.putImageData(imgData, 0, 0);
  ctx.drawImage(off, 0, 0, w, h, 0, 0, canvas.width, canvas.height);
  requestAnimationFrame(frame);
}

// ============================ INTERACTION ====================================
const clampZoomMap = z => Math.min(14, Math.max(0.06, z));
const clampZoomSys = z => Math.min(60, Math.max(0.04, z));
function localPt(e) { const r = canvas.getBoundingClientRect(); return [e.clientX - r.left, e.clientY - r.top]; }
// The galaxy disc is drawn gently inclined (vertical squash INCLINE, map mode
// only); mirror that here so cursor→world, panning and fit all stay consistent.
let INCLINE = 0.86; // set from wasm (galaxy_incline) on load
const inc = () => (mode === "map" ? INCLINE : 1);
function toWorld(lx, ly) { const c = cam(); return [c.x + (lx - canvas.width / 2) / c.zoom, c.y + (ly - canvas.height / 2) / (c.zoom * inc())]; }

const pointers = new Map();
let panLast = null, pinch = null;
let gestureMoved = false, gesturePinched = false, gestureCount = 0;
let lastTapNode = -1, lastTapTime = 0;

function startPinch() {
  const [a, b] = [...pointers.values()];
  pinch = { dist: Math.hypot(a.x - b.x, a.y - b.y) || 1, zoom: cam().zoom,
    mx0: (a.x + b.x) / 2, my0: (a.y + b.y) / 2, camx0: cam().x, camy0: cam().y };
  gesturePinched = true; panLast = null; follow = -1;
}

canvas.addEventListener("pointerdown", e => {
  const first = pointers.size === 0;
  try { canvas.setPointerCapture(e.pointerId); } catch {}
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  canvas.classList.add("drag");
  if (first) { panLast = { x: e.clientX, y: e.clientY }; gestureMoved = false; gesturePinched = false; gestureCount = 1; }
  else gestureCount++;
  if (pointers.size === 2) startPinch();
});

canvas.addEventListener("pointermove", e => {
  if (pointers.has(e.pointerId)) {                       // active drag / pinch
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (pointers.size >= 2 && pinch) {
      const [a, b] = [...pointers.values()];
      const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
      const dist = Math.hypot(a.x - b.x, a.y - b.y) || 1;
      const cl = mode === "map" ? clampZoomMap : clampZoomSys;
      const c = cam();
      c.zoom = cl(pinch.zoom * dist / pinch.dist);
      c.x = pinch.camx0 - (mx - pinch.mx0) / c.zoom; c.y = pinch.camy0 - (my - pinch.my0) / (c.zoom * inc());
      gestureMoved = true; return;
    }
    if (panLast && pointers.size === 1) {
      const dx = e.clientX - panLast.x, dy = e.clientY - panLast.y;
      panLast = { x: e.clientX, y: e.clientY };
      if (Math.abs(dx) + Math.abs(dy) > 6) gestureMoved = true;
      const c = cam(); c.x -= dx / c.zoom; c.y -= dy / (c.zoom * inc());
      if (mode === "system") follow = -1;
    }
    return;
  }
  if (mode === "map") {                                  // hover (mouse only)
    const [lx, ly] = localPt(e);
    const [wx, wy] = toWorld(lx, ly);
    const hit = G.node_at(gal, camMap.x, camMap.y, camMap.zoom, wx, wy);
    hoverNode = hit;
    const tip = $("tip");
    if (hit >= 0) {
      const nseed = G.node_seed(gal, hit) >>> 0, region = G.node_region(gal, hit);
      tip.innerHTML = `<b>${systemName(nseed)}</b> &nbsp;<i>${REGION_NAMES[region] || ""}</i>`;
      tip.style.left = e.clientX + "px"; tip.style.top = e.clientY + "px"; tip.style.display = "block";
      canvas.classList.add("pick");
    } else { tip.style.display = "none"; canvas.classList.remove("pick"); }
  }
});

function liftPointer(e) {
  try { canvas.releasePointerCapture(e.pointerId); } catch {}
  pointers.delete(e.pointerId);
  if (pointers.size < 2) pinch = null;
  if (pointers.size === 1) { const p = [...pointers.values()][0]; panLast = { x: p.x, y: p.y }; }
  if (pointers.size === 0) {
    canvas.classList.remove("drag");
    if (!gestureMoved && !gesturePinched && gestureCount === 1) {     // a clean tap
      const [lx, ly] = localPt(e);
      const [wx, wy] = toWorld(lx, ly);
      if (mode === "map") {
        const hit = G.node_at(gal, camMap.x, camMap.y, camMap.zoom, wx, wy);
        const now = performance.now();
        if (hit >= 0 && hit === lastTapNode && now - lastTapTime < 350) { enterSystem(hit); } // double-tap → enter
        else { selectNode(hit); }
        lastTapNode = hit; lastTapTime = now;
      } else {
        follow = S.nearest_center(sys, curW, curH, wx, wy, curW * camSys.zoom / canvas.width, tOrbit);
        if (follow >= 0) bgResync = true;
      }
    }
    panLast = null; gestureCount = 0;
  }
}
canvas.addEventListener("pointerup", liftPointer);
canvas.addEventListener("pointercancel", liftPointer);
canvas.addEventListener("pointerleave", () => { hoverNode = -1; $("tip").style.display = "none"; canvas.classList.remove("pick"); });

canvas.addEventListener("wheel", e => {
  e.preventDefault();
  const cl = mode === "map" ? clampZoomMap : clampZoomSys;
  const c = cam(); c.zoom = cl(c.zoom * Math.exp(-e.deltaY * 0.0015));
}, { passive: false });

// Double-click on desktop enters the system directly.
canvas.addEventListener("dblclick", e => {
  if (mode !== "map") return;
  const [lx, ly] = localPt(e); const [wx, wy] = toWorld(lx, ly);
  const hit = G.node_at(gal, camMap.x, camMap.y, camMap.zoom, wx, wy);
  if (hit >= 0) enterSystem(hit);
});
window.addEventListener("keydown", e => {
  if (e.key === "Escape" && mode === "system") exitSystem();
  if (e.key === "Enter" && mode === "map" && selNode >= 0) enterSystem(selNode);
});

// ============================ CONTROLS =======================================
$("dockHead").addEventListener("click", () => $("dock").classList.toggle("collapsed"));
$("gen").addEventListener("click", () => generateGalaxy((Math.random() * 0xffffff) >>> 0));
$("dice").addEventListener("click", () => generateGalaxy((Math.random() * 0xffffff) >>> 0));
$("seed").addEventListener("change", () => generateGalaxy(parseInt($("seed").value) || 0));
$("fit").addEventListener("click", fitMap);
$("back").addEventListener("click", exitSystem);
$("enter").addEventListener("click", () => enterSystem(selNode));

// Structural knobs rebuild the galaxy (keep the camera).
$("count").addEventListener("input", () => { vCount = parseInt($("count").value) || 0; $("countV").textContent = vCount === 0 ? "auto" : vCount; buildGalaxy(); });
$("link").addEventListener("input", () => { vLink = parseFloat($("link").value); $("linkV").textContent = vLink.toFixed(2); buildGalaxy(); });
$("arms").addEventListener("input", () => { vArms = parseInt($("arms").value) || 0; $("armsV").textContent = vArms === 0 ? "auto" : vArms; buildGalaxy(); });
// Look knobs are live (no rebuild).
$("nsize").addEventListener("input", () => { vNsize = parseFloat($("nsize").value); $("nsizeV").textContent = vNsize.toFixed(2) + "×"; G.galaxy_set_view(gal, vNsize, vHaze); });
$("haze").addEventListener("input", () => { vHaze = parseFloat($("haze").value); $("hazeV").textContent = vHaze.toFixed(2) + "×"; G.galaxy_set_view(gal, vNsize, vHaze); });
window.addEventListener("resize", setupCanvas);

// ================================ BOOT =======================================
async function loadWasm(url) {
  const res = await fetch(url + "?v=" + Date.now(), { cache: "no-store" });
  if (!res.ok) throw new Error(`no wasm at ${url}`);
  const { instance } = await WebAssembly.instantiate(await res.arrayBuffer(), {});
  return instance.exports;
}
async function main() {
  [G, S] = await Promise.all([loadWasm("./galaxy.wasm"), loadWasm("./solar.wasm")]);
  if (G.galaxy_incline) INCLINE = G.galaxy_incline();
  // Sanity: the JS name arrays must match the Rust tables.
  if (G.region_name_count() !== REGION_NAMES.length) console.warn("REGION_NAMES out of sync with Rust");
  gBufLen = (PIXEL_BUDGET + 16384) * 4; gBuf = G.alloc(gBufLen); posPtr = G.alloc(2 * 4);
  sBufLen = (PIXEL_BUDGET + 16384) * 4; sBuf = S.alloc(sBufLen); sPosPtr = S.alloc(2 * 4);
  setupCanvas();
  generateGalaxy(7);
  requestAnimationFrame(frame);
}
main().catch(e => { $("err").style.display = "grid"; $("err").textContent = "failed to load — " + e; console.error(e); });
</script>
</body>
