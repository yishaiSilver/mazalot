<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Procedural Solar System — Rust · WASM</title>
<link rel="icon" href="data:," />
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #05050b;
    color: #d7dae6; font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    /* Lock the page so touch gestures drive the canvas, not the browser. */
    position: fixed; width: 100%; overscroll-behavior: none; touch-action: none;
    -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
  #stage { position: fixed; inset: 0; width: 100%; height: 100%; display: block;
    cursor: grab; touch-action: none; background: #05050b;
    /* Upscale the internal buffer as crisp square pixels, not a blur — so the
       "pixel size" slider reads as chunky pixel-art. */
    image-rendering: pixelated; image-rendering: crisp-edges; }
  #stage.drag { cursor: grabbing; }

  .hud { position: fixed; pointer-events: none; z-index: 5;
    text-shadow: 0 1px 3px rgba(0,0,0,.9); }
  .topleft { top: 18px; left: 20px; }
  .topleft h1 { margin: 0; font-size: 12px; font-weight: 600; letter-spacing: .16em;
    text-transform: uppercase; color: #8790ad; }
  .viewing { margin-top: 8px; font-size: 22px; font-weight: 700; color: #eef1f8; text-transform: capitalize;
    min-height: 28px; }
  .viewing small { display: block; font-size: 12px; font-weight: 500; letter-spacing: .04em;
    color: #7b83a2; text-transform: none; margin-top: 2px; }
  .hint { position: fixed; top: 18px; right: 20px; z-index: 5; pointer-events: none;
    font-size: 12px; color: #6b7290; text-align: right; text-shadow: 0 1px 3px rgba(0,0,0,.9); letter-spacing: .03em; }
  .hint b { color: #aeb4cd; font-weight: 600; }

  /* Perf readout — live frame/CPU signal. Click (or press P) to cycle detail. */
  .perf { position: fixed; top: 64px; right: 20px; z-index: 6; pointer-events: auto;
    font: 11px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    color: #9aa0bb; background: rgba(14,15,24,.74); border: 1px solid rgba(255,255,255,.07);
    border-radius: 9px; padding: 6px 9px; backdrop-filter: blur(6px); cursor: pointer;
    min-width: 140px; text-shadow: none; }
  .perf b { color: #eef1f8; font-weight: 600; font-variant-numeric: tabular-nums; }
  .perf .lbl { color: #6b7290; }
  .perf .bar { height: 4px; border-radius: 3px; margin-top: 6px; background: rgba(255,255,255,.10); overflow: hidden; }
  .perf .bar i { display: block; height: 100%; width: 0; background: #57d38c; transition: width .15s linear, background .3s; }
  .perf.min .detail { display: none; }
  .perf.off { display: none; }

  /* Standalone Generate button (lifted out of the Controls dock). Bottom-left on
     desktop, mirroring the dock; always visible regardless of the dock state. */
  .genfab { position: fixed; left: 16px; bottom: 16px; z-index: 6; font-size: 13px;
    padding: 10px 18px; box-shadow: 0 8px 24px rgba(0,0,0,.55); }

  /* Control dock — docked bottom-right on desktop, collapsible. */
  .dock { position: fixed; right: 16px; bottom: 16px; z-index: 6; width: 268px;
    max-width: calc(100vw - 32px);
    background: rgba(14,15,24,.86); border: 1px solid rgba(255,255,255,.08);
    border-radius: 14px; box-shadow: 0 10px 40px rgba(0,0,0,.6); backdrop-filter: blur(9px); }
  .dock-head { display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px; cursor: pointer; user-select: none; }
  .dock-head span { font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: #8790ad; }
  .dock-head .chev { color: #8790ad; transition: transform .18s; }
  .dock.collapsed .chev { transform: rotate(180deg); }
  .dock-body { max-height: min(64vh, 560px); overflow-y: auto; overscroll-behavior: contain;
    padding: 2px 14px 14px; }
  .dock.collapsed .dock-body { display: none; }

  .row { display: flex; gap: 8px; align-items: center; }
  .row input[type=number] { flex: 1; }
  .grp { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: #565d78;
    margin: 15px 0 8px; border-top: 1px solid rgba(255,255,255,.07); padding-top: 11px; }
  .ctl { margin: 0 0 10px; }
  .ctl label { display: flex; justify-content: space-between; font-size: 12px; color: #9aa0bb; margin-bottom: 4px; }
  .ctl label b { color: #eef1f8; font-variant-numeric: tabular-nums; font-weight: 600; }
  input[type=number] { width: 100%; box-sizing: border-box; padding: 8px 9px; font: inherit; font-size: 13px;
    color: #eef1f8; background: #0e0f18; border: 1px solid rgba(255,255,255,.12); border-radius: 8px; }
  input[type=range] { width: 100%; accent-color: #f4b74a; cursor: pointer; }
  button { padding: 8px 12px; font: inherit; font-size: 13px; color: #d7dae6; background: #1a1c2b;
    border: 1px solid rgba(255,255,255,.12); border-radius: 8px; cursor: pointer; white-space: nowrap;
    -webkit-tap-highlight-color: transparent; }
  button:hover { background: #23263a; }
  button:active { transform: translateY(1px); }
  button.primary { color: #06060c; font-weight: 700; border: 0;
    background: linear-gradient(180deg, #ffe8b0, #f4b74a); }
  button.wide { width: 100%; margin-top: 14px; }
  .err { position: fixed; inset: 0; display: none; place-items: center; text-align: center;
    color: #ff9a9a; padding: 40px; z-index: 10; }

  /* Phones / small screens: dock becomes a bottom sheet; drop the desktop hint. */
  @media (max-width: 700px), (pointer: coarse) {
    .topleft { top: 10px; left: 12px; }
    .topleft h1 { font-size: 10px; letter-spacing: .12em; }
    .viewing { font-size: 17px; margin-top: 5px; min-height: 22px; }
    .viewing small { font-size: 11px; }
    .hint { display: none; }
    .perf { top: 10px; right: 12px; min-width: 0; } /* hint is hidden here → reuse the corner */
    /* Bottom is the dock sheet on mobile → sit the button under the title instead. */
    .genfab { bottom: auto; top: 70px; left: 12px; padding: 8px 14px; font-size: 12px; }
    .dock { left: 10px; right: 10px; bottom: calc(10px + env(safe-area-inset-bottom)); width: auto; }
    .dock-body { max-height: 46vh; }
  }
</style>
</head>
<body>
<canvas id="stage"></canvas>

<div class="hud topleft">
  <h1>Procedural Solar System</h1>
  <div class="viewing" id="viewing">loading…<small id="sysinfo">Rust → WebAssembly</small></div>
</div>

<!-- Primary action, deliberately OUTSIDE the collapsible Controls dock so a new
     system is always one click away even when settings are closed. -->
<button class="primary genfab" id="gen" title="new random solar system">✦ Generate</button>
<div class="hint">
  <b>drag</b> to pan · <b>scroll / pinch</b> to zoom<br><b>tap a planet</b> to follow it
</div>

<div class="perf" id="perf" title="frame performance — click or press P to toggle">
  <div><b id="pfFps">–</b> fps <span class="lbl">·</span> <b id="pfRender">–</b> ms <span class="lbl">render</span></div>
  <div class="detail">
    <div class="lbl" id="pfFrame">frame – ms</div>
    <div class="lbl" id="pfLoad">CPU – % of 60 fps</div>
    <div class="lbl" id="pfRes">– × –</div>
    <div id="pfBg" class="lbl">bg –</div>
    <div class="bar"><i id="pfBar"></i></div>
  </div>
</div>

<div class="dock" id="dock">
  <div class="dock-head" id="dockHead">
    <span>Controls</span><span class="chev">▾</span>
  </div>
  <div class="dock-body">
    <div class="row">
      <input type="number" id="seed" min="0" value="7" title="seed" />
      <button id="dice" title="new random system">🎲</button>
    </div>

    <div class="grp">Layout</div>
    <div class="ctl"><label>Planets <b id="countV">—</b></label><input type="range" id="count" min="1" max="12" step="1" value="6" /></div>
    <div class="ctl"><label>Planet spacing <b id="spacingV">1.00×</b></label><input type="range" id="spacing" min="0.4" max="2.5" step="0.05" value="1" /></div>
    <div class="ctl"><label>Planet size <b id="psizeV">1.00×</b></label><input type="range" id="psize" min="0.3" max="3" step="0.05" value="1" /></div>
    <div class="ctl"><label>Sun size <b id="ssizeV">1.00×</b></label><input type="range" id="ssize" min="0.3" max="3" step="0.05" value="1" /></div>
    <div class="ctl"><label>Orbit thickness <b id="orbwV">1px</b></label><input type="range" id="orbw" min="1" max="6" step="1" value="1" /></div>
    <div class="ctl"><label>Eccentricity <b id="eccV">1.00×</b></label><input type="range" id="ecc" min="0" max="2" step="0.05" value="1" /></div>

    <div class="grp">Motion</div>
    <div class="ctl"><label>Orbit speed <b id="speedV">1.0×</b></label><input type="range" id="speed" min="0" max="4" step="0.1" value="1" /></div>
    <div class="ctl"><label>Planet rotation <b id="protV">1.0×</b></label><input type="range" id="prot" min="0" max="4" step="0.1" value="1" /></div>
    <div class="ctl"><label>Star rotation <b id="srotV">1.0×</b></label><input type="range" id="srot" min="0" max="4" step="0.1" value="1" /></div>

    <div class="grp">Pixelation</div>
    <div class="ctl"><label>Scene <b id="pixV">1×</b></label><input type="range" id="pix" min="1" max="8" step="1" value="1" /></div>
    <div class="ctl"><label>Planets <b id="ppixV">1×</b></label><input type="range" id="ppix" min="1" max="6" step="1" value="1" /></div>
    <div class="ctl"><label>Sun <b id="spixV">1×</b></label><input type="range" id="spix" min="1" max="6" step="1" value="1" /></div>
    <div class="ctl"><label>Planet detail cap <b id="pdetV">160</b></label><input type="range" id="pdet" min="16" max="256" step="8" value="160" /></div>
    <div class="ctl"><label>Sun detail cap <b id="sdetV">110</b></label><input type="range" id="sdet" min="16" max="176" step="8" value="110" /></div>

    <div class="grp">Background</div>
    <div class="ctl"><label>Star density <b id="sdenV">0.50×</b></label><input type="range" id="sden" min="0" max="2" step="0.05" value="0.5" /></div>
    <div class="ctl"><label>Star parallax <b id="sparV">1.00×</b></label><input type="range" id="spar" min="0" max="3" step="0.05" value="1" /></div>

    <button class="wide" id="fit">⤢ Reset view</button>
  </div>
</div>

<div class="err" id="err"></div>

<script type="module">
// Names must stay index-aligned with the Rust tables (PKINDS / SUNS).
const PLANET_NAMES = ["terran","ocean","jungle","desert","barren","lava","ice","gas giant","ice giant","ringed giant"];
const SUN_NAMES = ["yellow dwarf","orange dwarf","red giant","white star","blue giant"];

const $ = id => document.getElementById(id);
const canvas = $("stage");
const ctx = canvas.getContext("2d", { alpha: false });
ctx.imageSmoothingEnabled = false;
const off = document.createElement("canvas");
const octx = off.getContext("2d");

let wasm, sys = 0, bufPtr = 0, bufLen = 0, posPtr = 0, imgData;
// Two INDEPENDENT quantities:
//   • cam.zoom = MAGNIFICATION — display (CSS) px per world unit; wheel / pinch /
//     fit change it. Bigger = a closer camera: things look larger AND resolve
//     more detail.
//   • pix      = PIXEL SIZE — how many display px one rendered pixel spans (the
//     slider). The render buffer is sized so a rendered pixel is always ~`pix`
//     display px REGARDLESS of zoom, then upscaled crisply. So the on-screen
//     block size is constant at every zoom (a consistent pixel-art look), while
//     zooming in renders bodies at a higher resolution — zoom reveals detail
//     rather than magnifying fixed blocks. Per-body pixel sliders (planet / sun)
//     make those bodies chunkier still, on top of this.
let cam = { x: 0, y: 0, zoom: 1 };
let seed = 7, pix = 1;
// Three independent animation clocks so orbit / planet-spin / star-spin pace
// separately; each accumulates so changing a speed never makes motion jump.
let tOrbit = 0, tSpin = 0, tSun = 0;
let orbitSpeed = 1, planetRot = 1, starRot = 1;
let follow = -1;                        // planet index the camera tracks, or -1
let planetKinds = [], sunKind = 0, nPlanets = 0;
let last = performance.now();
let curW = 0, curH = 0, curZoom = 1;    // last frame's render dims + render-px/world
// Background scroll = accumulated SCREEN-space camera pan (Δcam·zoom summed), so
// the star parallax rate is the same at every zoom and pure zoom moves nothing.
let bgPanX = 0, bgPanY = 0, camPrevX = 0, camPrevY = 0, bgResync = true;

// Perf readout: exponentially-smoothed FPS / WASM-render ms / whole-frame ms,
// plus a signal for whether the cached backdrop was reused this frame. DOM text
// is refreshed a few times a second; the EMAs update every frame.
let emaFps = 60, emaRender = 0, emaFrame = 0;
let perfPrev = performance.now(), perfDrawn = 0, bgSig = "", bgRedrewInWindow = false;

// Manual overrides applied to the System without regenerating it (spacing,
// sizes, per-body pixelation, per-body detail caps), plus the planet count
// (structural — needs a rebuild). countAuto keeps the seed-derived count until
// the user sets one.
let vSpacing = 1, vPsize = 1, vSsize = 1, vPpix = 1, vSpix = 1, vPdetail = 160, vSdetail = 110, vStarDen = 0.5, vStarPar = 1;
let vOrbitW = 1; // dashed orbit-path line thickness in px
let vEcc = 1;    // eccentricity multiplier (0 = circular, 1 = as generated)
let planetCount = 6, countAuto = true;

// Per-frame pixel-budget cap (perf): a phone renders far fewer pixels than a
// desktop. The internal buffer is allocated once at this size and reused.
const coarse = window.matchMedia("(pointer: coarse)").matches;
const PIXEL_BUDGET = coarse ? 430_000 : 1_600_000;

// Match the canvas backing store to the display size; the crisp upscale from the
// (smaller) render buffer happens in drawImage with smoothing off.
function setupCanvas() {
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  canvas.style.width = window.innerWidth + "px"; canvas.style.height = window.innerHeight + "px";
  ctx.imageSmoothingEnabled = false; // reset whenever the backing store resizes
}

// Resolve this frame's render buffer. Its size follows `pix` (one rendered pixel
// ≈ `pix` display px) and is INDEPENDENT of zoom, so the on-screen block size is
// constant. `zoomArg` = render-px-per-world = w·zoom/cssW, which GROWS with zoom,
// so bodies are rendered at higher resolution as you zoom in (detail, not bigger
// blocks). The budget cap only makes it chunkier under load.
function computeRender() {
  const cssW = canvas.width, cssH = canvas.height;
  let w = Math.round(cssW / pix);
  let h = Math.round(cssH / pix);
  const bs = Math.min(1, Math.sqrt(PIXEL_BUDGET / (w * h)));
  w = Math.round(w * bs); h = Math.round(h * bs);
  // Clamp + quantize to 8px steps so the buffer is reallocated rarely.
  w = Math.max(16, w - (w % 8)); h = Math.max(12, h - (h % 8));
  return { w, h, zoomArg: w * cam.zoom / cssW };
}

function fitView() {
  const ext = wasm.system_extent(sys);
  // On-screen half-span = ext * zoom; fit it into ~90% of the viewport.
  const z = Math.min(0.45 * canvas.width / ext, 0.45 * canvas.height / (ext * 0.55));
  cam = { x: 0, y: 0, zoom: z };
  follow = -1;
  bgPanX = 0; bgPanY = 0; bgResync = true; // recenter + skip the jump next frame
}

// Push the live view multipliers + detail caps into the current system.
function applyView() {
  if (sys) wasm.system_set_view(sys, vSpacing, vPsize, vSsize, vPpix, vSpix, vPdetail, vSdetail, vStarDen, vStarPar);
}

// (Re)build the system for the current seed + planet count and re-apply the
// view multipliers. Does NOT touch the camera — callers decide whether to fit.
function buildSystem() {
  if (sys) wasm.system_free(sys);
  sys = wasm.system_new_params(seed, countAuto ? 0 : planetCount);
  nPlanets = wasm.planet_count(sys);
  sunKind = wasm.sun_kind_of(sys);
  planetKinds = [];
  for (let i = 0; i < nPlanets; i++) planetKinds.push(wasm.planet_kind_at(sys, i));
  if (countAuto) { planetCount = nPlanets; $("count").value = nPlanets; }
  $("countV").textContent = nPlanets;
  applyView();
  // A rebuild makes a fresh System (orbit width defaults to 1), so re-apply the
  // stored thickness — keeps the chosen look across seed/planet-count changes.
  if (sys) wasm.system_set_orbit_width(sys, vOrbitW);
  if (sys) wasm.system_set_eccentricity(sys, vEcc);
  $("sysinfo").textContent = `${SUN_NAMES[sunKind] ?? "star"} · ${nPlanets} planets · seed ${seed}`;
}

// A new seed: rebuild and re-frame the whole system.
function generate(s) {
  seed = s >>> 0;
  $("seed").value = seed;
  buildSystem();
  tOrbit = tSpin = tSun = 0;
  fitView();
}

function frame(now) {
  const frameStart = performance.now();
  const dt = Math.min(0.05, (now - last) / 1000); last = now;
  tOrbit += dt * orbitSpeed;
  tSpin  += dt * planetRot;
  tSun   += dt * starRot;

  // Camera follows a clicked planet as it sweeps around its orbit.
  if (follow >= 0 && follow < nPlanets) {
    wasm.planet_pos(sys, follow, tOrbit, posPtr);
    const p = new Float32Array(wasm.memory.buffer, posPtr, 2);
    cam.x = p[0]; cam.y = p[1];
  }

  // Accumulate the camera's SCREEN-space pan (Δcam·zoom) for the background.
  // A resync (after fit/generate/follow-start) skips one frame so a camera jump
  // doesn't lurch the stars; pure zoom adds nothing since Δcam is 0.
  if (bgResync) { camPrevX = cam.x; camPrevY = cam.y; bgResync = false; }
  bgPanX += (cam.x - camPrevX) * cam.zoom;
  bgPanY += (cam.y - camPrevY) * cam.zoom;
  camPrevX = cam.x; camPrevY = cam.y;

  const { w, h, zoomArg } = computeRender();
  if (w !== curW || h !== curH) {   // (re)size the render surfaces only on change
    curW = w; curH = h;
    off.width = w; off.height = h;
    imgData = octx.createImageData(w, h);
  }
  curZoom = zoomArg;
  // Does this frame reuse the cached backdrop? Mirror the Rust bg cache key: if
  // none of (size, camera, zoom, pan, bg view params) changed, only the bodies
  // re-render and the whole background is a memcpy.
  const sig = `${w},${h},${cam.x},${cam.y},${cam.zoom},${bgPanX},${bgPanY},${vStarDen},${vStarPar},${vSpacing}`;
  if (sig !== bgSig) bgRedrewInWindow = true;   // backdrop repainted this frame
  bgSig = sig;

  // Time the actual WASM procedural render — the CPU cost the profiling targets.
  const r0 = performance.now();
  wasm.render_t(sys, bufPtr, w, h, cam.x, cam.y, zoomArg, bgPanX, bgPanY, tOrbit, tSpin, tSun);
  const renderMs = performance.now() - r0;
  const view = new Uint8Array(wasm.memory.buffer, bufPtr, w * h * 4);
  imgData.data.set(view);
  octx.putImageData(imgData, 0, 0);
  // Crisp upscale of the small render buffer to the full display (no smoothing).
  ctx.drawImage(off, 0, 0, w, h, 0, 0, canvas.width, canvas.height);

  // HUD: what's under the crosshair (viewport centre)?
  const near = follow >= 0 ? follow : wasm.nearest_center(sys, w, h, cam.x, cam.y, zoomArg, tOrbit);
  const v = $("viewing");
  const kind = near >= 0 ? (PLANET_NAMES[planetKinds[near]] ?? "planet") : (SUN_NAMES[sunKind] ?? "the star");
  v.firstChild.textContent = (follow >= 0 ? "◎ following " : "") + kind + " ";

  updatePerf(now, renderMs, performance.now() - frameStart);
  requestAnimationFrame(frame);
}

// Smooth the raw per-frame timings and surface them a few times a second.
const FRAME_BUDGET = 1000 / 60; // ms of CPU one 60 fps frame affords
function updatePerf(now, renderMs, frameMs) {
  const iv = now - perfPrev; perfPrev = now;
  if (iv > 0 && iv < 1000) emaFps += (1000 / iv - emaFps) * 0.1;
  emaRender += (renderMs - emaRender) * 0.1;
  emaFrame += (frameMs - emaFrame) * 0.1;
  if (now - perfDrawn < 220) return;            // throttle DOM writes to ~4.5/s
  perfDrawn = now;
  const load = emaRender / FRAME_BUDGET * 100;  // render CPU as % of a 60 fps budget
  const px = curW * curH;
  $("pfFps").textContent = emaFps.toFixed(0);
  $("pfRender").textContent = emaRender.toFixed(1);
  $("pfFrame").textContent = `frame ${emaFrame.toFixed(1)} ms`;
  $("pfLoad").textContent = `CPU ${load.toFixed(0)}% of 60 fps`;
  $("pfRes").textContent = `${curW}×${curH} · ${(px / 1000).toFixed(0)}k px`;
  $("pfBg").textContent = bgRedrewInWindow ? "backdrop redraw" : "backdrop cached ✓";
  bgRedrewInWindow = false;                      // reset for the next window
  const bar = $("pfBar");
  bar.style.width = Math.min(100, load).toFixed(0) + "%";
  bar.style.background = load < 60 ? "#57d38c" : load < 100 ? "#f4b74a" : "#ef6a6a";
}

// ---- interaction: one finger / mouse drags to pan, two fingers pinch to
//      zoom + pan, a tap follows the body under it, the wheel zooms. Unified
//      over Pointer Events so mouse and touch share one code path. ----------
const clampZoom = z => Math.min(60, Math.max(0.04, z));
// Everything below works in CSS px; cam.zoom is CSS px per world unit, and the
// canvas backing store is 1:1 with CSS px, so a client-relative point maps to
// world directly — no render-resolution factor involved (that's the whole point:
// interaction and framing are independent of how pixelated the render is).
function localPt(e) { const r = canvas.getBoundingClientRect(); return [e.clientX - r.left, e.clientY - r.top]; }
function toWorld(lx, ly) { return [cam.x + (lx - canvas.width / 2) / cam.zoom, cam.y + (ly - canvas.height / 2) / cam.zoom]; }

const pointers = new Map();     // active pointerId -> {x, y} in CSS px
let panLast = null;             // last pos for single-pointer drag
let pinch = null;               // {dist, zoom, wx, wy} captured at pinch start
let gestureMoved = false, gesturePinched = false, gestureCount = 0;

function startPinch() {
  const [a, b] = [...pointers.values()];
  pinch = {
    dist: Math.hypot(a.x - b.x, a.y - b.y) || 1, zoom: cam.zoom,
    mx0: (a.x + b.x) / 2, my0: (a.y + b.y) / 2, // client-px midpoint at start
    camx0: cam.x, camy0: cam.y,
  };
  gesturePinched = true; panLast = null; follow = -1;
}

canvas.addEventListener("pointerdown", e => {
  const first = pointers.size === 0;
  try { canvas.setPointerCapture(e.pointerId); } catch {}
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  canvas.classList.add("drag");
  if (first) { panLast = { x: e.clientX, y: e.clientY }; gestureMoved = false; gesturePinched = false; gestureCount = 1; }
  else gestureCount++;
  if (pointers.size === 2) startPinch();
});

canvas.addEventListener("pointermove", e => {
  if (!pointers.has(e.pointerId)) return;
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (pointers.size >= 2 && pinch) {                 // two-finger pinch: zoom + pan
    const [a, b] = [...pointers.values()];
    const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2; // client px
    const dist = Math.hypot(a.x - b.x, a.y - b.y) || 1;
    // Zoom about the camera CENTRE (the zoom itself never moves cam); a
    // two-finger drag pans by the midpoint movement.
    cam.zoom = clampZoom(pinch.zoom * dist / pinch.dist);
    cam.x = pinch.camx0 - (mx - pinch.mx0) / cam.zoom;
    cam.y = pinch.camy0 - (my - pinch.my0) / cam.zoom;
    gestureMoved = true;
    return;
  }

  if (panLast && pointers.size === 1) {              // one-finger / mouse drag: pan
    const dx = e.clientX - panLast.x, dy = e.clientY - panLast.y;
    panLast = { x: e.clientX, y: e.clientY };
    if (Math.abs(dx) + Math.abs(dy) > 6) gestureMoved = true;
    cam.x -= dx / cam.zoom; cam.y -= dy / cam.zoom;  // world units = CSS px / zoom
    follow = -1;                                     // grabbing the view releases follow
  }
});

function liftPointer(e) {
  try { canvas.releasePointerCapture(e.pointerId); } catch {}
  pointers.delete(e.pointerId);
  if (pointers.size < 2) pinch = null;
  if (pointers.size === 1) { const p = [...pointers.values()][0]; panLast = { x: p.x, y: p.y }; }
  if (pointers.size === 0) {
    canvas.classList.remove("drag");
    // A clean single tap (no drag, no pinch) follows the body under it. The
    // hit test reuses the last frame's render dims + density (curW/H/Zoom).
    if (!gestureMoved && !gesturePinched && gestureCount === 1) {
      const [lx, ly] = localPt(e);
      const [cx, cy] = toWorld(lx, ly);
      follow = wasm.nearest_center(sys, curW, curH, cx, cy, curZoom, tOrbit); // -1 = release
      if (follow >= 0) bgResync = true; // cam will jump to the planet next frame
    }
    panLast = null; gestureCount = 0;
  }
}
canvas.addEventListener("pointerup", liftPointer);
canvas.addEventListener("pointercancel", liftPointer);

canvas.addEventListener("wheel", e => {
  e.preventDefault();
  // Zoom about the camera CENTRE: only the zoom changes, cam stays put. This
  // keeps the whole scene (and the background parallax anchor) centred, so the
  // parallax doesn't lurch when the system is panned off-centre.
  cam.zoom = clampZoom(cam.zoom * Math.exp(-e.deltaY * 0.0015));
}, { passive: false });

// ---- controls --------------------------------------------------------------
$("dockHead").addEventListener("click", () => $("dock").classList.toggle("collapsed"));

// Perf readout: click to collapse to the one-line summary; press P to hide it.
$("perf").addEventListener("click", () => $("perf").classList.toggle("min"));
window.addEventListener("keydown", e => {
  if ((e.key === "p" || e.key === "P") && e.target.tagName !== "INPUT") $("perf").classList.toggle("off");
});

// Generate makes a NEW random system each click; the dice does the same. Type a
// number in the seed field to load a specific system instead.
$("gen").addEventListener("click", () => generate((Math.random() * 0xffffff) >>> 0));
$("dice").addEventListener("click", () => generate((Math.random() * 0xffffff) >>> 0));
$("seed").addEventListener("change", () => generate((parseInt($("seed").value) || 0)));
$("fit").addEventListener("click", fitView);

// Planet count is structural → rebuild (keep the camera). Once set, it sticks
// across new seeds (countAuto stays off).
$("count").addEventListener("input", () => {
  planetCount = parseInt($("count").value) || 1; countAuto = false;
  $("countV").textContent = planetCount; buildSystem();
});

// Live view multipliers: rescale the existing system, no rebuild, no re-frame.
const liveMul = (id, valId, set, fmt) => $(id).addEventListener("input", () => {
  const v = parseFloat($(id).value); set(v); $(valId).textContent = fmt(v); applyView();
});
liveMul("spacing", "spacingV", v => vSpacing = v, v => v.toFixed(2) + "×");
liveMul("psize", "psizeV", v => vPsize = v, v => v.toFixed(2) + "×");
liveMul("ssize", "ssizeV", v => vSsize = v, v => v.toFixed(2) + "×");
liveMul("ppix", "ppixV", v => vPpix = v, v => v + "×");
liveMul("spix", "spixV", v => vSpix = v, v => v + "×");

// Orbit-path line thickness: pushes straight to wasm (not a set_view param).
$("orbw").addEventListener("input", () => {
  vOrbitW = parseInt($("orbw").value) || 1;
  $("orbwV").textContent = vOrbitW + "px";
  if (sys) wasm.system_set_orbit_width(sys, vOrbitW);
});

// Eccentricity multiplier: 0 = circular, 1 = as generated, up to 2 = exaggerated.
$("ecc").addEventListener("input", () => {
  vEcc = parseFloat($("ecc").value);
  $("eccV").textContent = vEcc.toFixed(2) + "×";
  if (sys) wasm.system_set_eccentricity(sys, vEcc);
});

// Purely JS-side: animation rate and scene render density.
$("speed").addEventListener("input", () => { orbitSpeed = parseFloat($("speed").value); $("speedV").textContent = orbitSpeed.toFixed(1) + "×"; });
$("prot").addEventListener("input", () => { planetRot = parseFloat($("prot").value); $("protV").textContent = planetRot.toFixed(1) + "×"; });
$("srot").addEventListener("input", () => { starRot = parseFloat($("srot").value); $("srotV").textContent = starRot.toFixed(1) + "×"; });
$("pix").addEventListener("input", () => { pix = parseInt($("pix").value) || 1; $("pixV").textContent = pix + "×"; });
// Detail caps (the "lower bound of pixelation"): live view params, no rebuild.
liveMul("pdet", "pdetV", v => vPdetail = v, v => String(v | 0));
liveMul("sdet", "sdetV", v => vSdetail = v, v => String(v | 0));
liveMul("sden", "sdenV", v => vStarDen = v, v => v.toFixed(2) + "×");
liveMul("spar", "sparV", v => vStarPar = v, v => v.toFixed(2) + "×");
window.addEventListener("resize", setupCanvas);

async function main() {
  const res = await fetch("./solar.wasm?v=" + Date.now(), { cache: "no-store" });
  const { instance } = await WebAssembly.instantiate(await res.arrayBuffer(), {});
  wasm = instance.exports;
  posPtr = wasm.alloc(2 * 4);              // scratch for planet_pos
  // Sized to the budget once (+ margin to absorb rounding in computeRender, so
  // w*h*4 can never exceed this and the WASM render stays in bounds).
  bufLen = (PIXEL_BUDGET + 16384) * 4;
  bufPtr = wasm.alloc(bufLen);
  setupCanvas();
  generate(7);
  requestAnimationFrame(frame);
}
main().catch(e => { $("err").style.display = "grid"; $("err").textContent = "failed to load solar.wasm — " + e; console.error(e); });
</script>
</body>
