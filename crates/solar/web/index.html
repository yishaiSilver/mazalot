<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Procedural Solar System — Rust · WASM</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #05050b;
    color: #d7dae6; font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    /* Lock the page so touch gestures drive the canvas, not the browser. */
    position: fixed; width: 100%; overscroll-behavior: none; touch-action: none;
    -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
  #stage { position: fixed; inset: 0; width: 100%; height: 100%; display: block;
    cursor: grab; touch-action: none; background: #05050b;
    /* Upscale the internal buffer as crisp square pixels, not a blur — so the
       "pixel size" slider reads as chunky pixel-art. */
    image-rendering: pixelated; image-rendering: crisp-edges; }
  #stage.drag { cursor: grabbing; }

  .hud { position: fixed; pointer-events: none; z-index: 5;
    text-shadow: 0 1px 3px rgba(0,0,0,.9); }
  .topleft { top: 18px; left: 20px; }
  .topleft h1 { margin: 0; font-size: 12px; font-weight: 600; letter-spacing: .16em;
    text-transform: uppercase; color: #8790ad; }
  .viewing { margin-top: 8px; font-size: 22px; font-weight: 700; color: #eef1f8; text-transform: capitalize;
    min-height: 28px; }
  .viewing small { display: block; font-size: 12px; font-weight: 500; letter-spacing: .04em;
    color: #7b83a2; text-transform: none; margin-top: 2px; }
  .hint { position: fixed; top: 18px; right: 20px; z-index: 5; pointer-events: none;
    font-size: 12px; color: #6b7290; text-align: right; text-shadow: 0 1px 3px rgba(0,0,0,.9); letter-spacing: .03em; }
  .hint b { color: #aeb4cd; font-weight: 600; }

  .bar { position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%); z-index: 6;
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: center;
    padding: 10px 12px; border-radius: 14px; max-width: calc(100vw - 24px);
    background: rgba(14,15,24,.82); border: 1px solid rgba(255,255,255,.08);
    box-shadow: 0 10px 40px rgba(0,0,0,.6); backdrop-filter: blur(8px); }
  .bar .seg { display: flex; align-items: center; gap: 6px; }
  .bar label { font-size: 11px; color: #8790ad; letter-spacing: .04em; }
  input[type=number] { width: 92px; padding: 7px 9px; font: inherit; font-size: 13px; color: #eef1f8;
    background: #0e0f18; border: 1px solid rgba(255,255,255,.12); border-radius: 8px; }
  input[type=range] { width: 120px; accent-color: #f4b74a; cursor: pointer; }
  button { padding: 8px 13px; font: inherit; font-size: 13px; color: #d7dae6; background: #1a1c2b;
    border: 1px solid rgba(255,255,255,.12); border-radius: 8px; cursor: pointer; white-space: nowrap; }
  button:hover { background: #23263a; }
  button:active { transform: translateY(1px); }
  button.primary { color: #06060c; font-weight: 700; border: 0;
    background: linear-gradient(180deg, #ffe8b0, #f4b74a); }
  .divider { width: 1px; align-self: stretch; background: rgba(255,255,255,.1); margin: 0 2px; }
  .val { font-variant-numeric: tabular-nums; color: #eef1f8; font-size: 12px; min-width: 30px; text-align: right; }
  .err { position: fixed; inset: 0; display: none; place-items: center; text-align: center;
    color: #ff9a9a; padding: 40px; z-index: 10; }

  /* Phones / small screens: tighten the chrome and drop the desktop hint. */
  @media (max-width: 700px), (pointer: coarse) {
    .topleft { top: 10px; left: 12px; }
    .topleft h1 { font-size: 10px; letter-spacing: .12em; }
    .viewing { font-size: 17px; margin-top: 5px; min-height: 22px; }
    .viewing small { font-size: 11px; }
    .hint { display: none; }
    .bar { bottom: calc(10px + env(safe-area-inset-bottom)); gap: 6px; padding: 8px 10px; border-radius: 12px; }
    .bar label { display: none; }
    input[type=number] { width: 66px; padding: 8px; }
    input[type=range] { width: 84px; }
    button { padding: 9px 12px; }
    .divider { display: none; }
  }
</style>
</head>
<body>
<canvas id="stage"></canvas>

<div class="hud topleft">
  <h1>Procedural Solar System</h1>
  <div class="viewing" id="viewing">loading…<small id="sysinfo">Rust → WebAssembly</small></div>
</div>
<div class="hint">
  <b>drag</b> to pan · <b>scroll / pinch</b> to zoom<br><b>tap a planet</b> to follow it
</div>

<div class="bar">
  <div class="seg">
    <label>Seed</label>
    <input type="number" id="seed" min="0" value="7" />
    <button id="dice" title="random seed">🎲</button>
  </div>
  <button class="primary" id="gen">✦ Generate</button>
  <div class="divider"></div>
  <div class="seg">
    <label>Speed</label>
    <input type="range" id="speed" min="0" max="4" step="0.1" value="1" />
    <span class="val" id="speedV">1.0×</span>
  </div>
  <div class="divider"></div>
  <div class="seg">
    <label>Pixel size</label>
    <input type="range" id="pix" min="1" max="8" step="1" value="1" />
    <span class="val" id="pixV">1×</span>
  </div>
  <div class="divider"></div>
  <button id="fit">⤢ Reset view</button>
</div>

<div class="err" id="err"></div>

<script type="module">
// Names must stay index-aligned with the Rust tables (PKINDS / SUNS).
const PLANET_NAMES = ["terran","ocean","jungle","desert","barren","lava","ice","gas giant","ice giant","ringed giant"];
const SUN_NAMES = ["yellow dwarf","orange dwarf","red giant","white star","blue giant"];

const $ = id => document.getElementById(id);
const canvas = $("stage");
const ctx = canvas.getContext("2d", { alpha: false });
ctx.imageSmoothingEnabled = false;
const off = document.createElement("canvas");
const octx = off.getContext("2d");

let wasm, sys = 0, bufPtr = 0, bufLen = 0, posPtr = 0, imgData;
// Two INDEPENDENT quantities, deliberately split so zoom no longer changes how
// pixelated things look:
//   • cam.zoom = MAGNIFICATION — display (CSS) px per world unit; what wheel /
//     pinch / fit change. Bigger = things look larger on screen.
//   • pix      = PIXEL DENSITY — how many display px each *rendered* pixel spans
//     (the slider). We render the scene at a density fixed by `pix` alone, then
//     scale that buffer up crisply, so a body is always the same chunky sprite,
//     just larger when zoomed. Zoom magnifies pixels; it never adds detail.
let cam = { x: 0, y: 0, zoom: 1 };
let time = 0, speed = 1, seed = 7, pix = 1;
let follow = -1;                        // planet index the camera tracks, or -1
let planetKinds = [], sunKind = 0, nPlanets = 0;
let last = performance.now();
let curW = 0, curH = 0, curZoom = 1;    // last frame's render dims + render-px/world

// Base render-pixels per world unit at pix=1. `pix` divides this, so the
// rendered detail density depends ONLY on the slider — never on zoom.
const BASE_DENSITY = 1.0;
// Per-frame pixel-budget cap (perf): a phone renders far fewer pixels than a
// desktop. The internal buffer is allocated once at this size and reused.
const coarse = window.matchMedia("(pointer: coarse)").matches;
const PIXEL_BUDGET = coarse ? 430_000 : 1_600_000;

// Match the canvas backing store to the display size; the crisp upscale from the
// (smaller) render buffer happens in drawImage with smoothing off.
function setupCanvas() {
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  canvas.style.width = window.innerWidth + "px"; canvas.style.height = window.innerHeight + "px";
  ctx.imageSmoothingEnabled = false; // reset whenever the backing store resizes
}

// Resolve this frame's render buffer: density fixed by `pix`, size follows zoom
// (zoom in → fewer, bigger pixels), capped by the budget. `zoomArg` is the
// render-px-per-world actually used, so world→screen geometry stays exact.
function computeRender() {
  const cssW = canvas.width, cssH = canvas.height;
  const rpw = BASE_DENSITY / pix;
  let w = Math.round(rpw * cssW / cam.zoom);
  let h = Math.round(rpw * cssH / cam.zoom);
  const bs = Math.min(1, Math.sqrt(PIXEL_BUDGET / (w * h)));
  w = Math.round(w * bs); h = Math.round(h * bs);
  // Clamp + quantize to 8px steps so the buffer is reallocated rarely while zooming.
  w = Math.max(16, w - (w % 8)); h = Math.max(12, h - (h % 8));
  return { w, h, zoomArg: w * cam.zoom / cssW };
}

function fitView() {
  const ext = wasm.system_extent(sys);
  // On-screen half-span = ext * zoom; fit it into ~90% of the viewport.
  const z = Math.min(0.45 * canvas.width / ext, 0.45 * canvas.height / (ext * 0.55));
  cam = { x: 0, y: 0, zoom: z };
  follow = -1;
}

function generate(s) {
  if (sys) wasm.system_free(sys);
  seed = s >>> 0;
  sys = wasm.system_new(seed);
  nPlanets = wasm.planet_count(sys);
  sunKind = wasm.sun_kind_of(sys);
  planetKinds = [];
  for (let i = 0; i < nPlanets; i++) planetKinds.push(wasm.planet_kind_at(sys, i));
  time = 0;
  fitView();
  $("seed").value = seed;
  $("sysinfo").textContent = `${SUN_NAMES[sunKind] ?? "star"} · ${nPlanets} planets · seed ${seed}`;
}

function frame(now) {
  const dt = Math.min(0.05, (now - last) / 1000); last = now;
  time += dt * speed;

  // Camera follows a clicked planet as it sweeps around its orbit.
  if (follow >= 0 && follow < nPlanets) {
    wasm.planet_pos(sys, follow, time, posPtr);
    const p = new Float32Array(wasm.memory.buffer, posPtr, 2);
    cam.x = p[0]; cam.y = p[1];
  }

  const { w, h, zoomArg } = computeRender();
  if (w !== curW || h !== curH) {   // (re)size the render surfaces only on change
    curW = w; curH = h;
    off.width = w; off.height = h;
    imgData = octx.createImageData(w, h);
  }
  curZoom = zoomArg;
  wasm.render(sys, bufPtr, w, h, cam.x, cam.y, zoomArg, time);
  const view = new Uint8Array(wasm.memory.buffer, bufPtr, w * h * 4);
  imgData.data.set(view);
  octx.putImageData(imgData, 0, 0);
  // Crisp upscale of the small render buffer to the full display (no smoothing).
  ctx.drawImage(off, 0, 0, w, h, 0, 0, canvas.width, canvas.height);

  // HUD: what's under the crosshair (viewport centre)?
  const near = follow >= 0 ? follow : wasm.nearest_center(sys, w, h, cam.x, cam.y, zoomArg, time);
  const v = $("viewing");
  const kind = near >= 0 ? (PLANET_NAMES[planetKinds[near]] ?? "planet") : (SUN_NAMES[sunKind] ?? "the star");
  v.firstChild.textContent = (follow >= 0 ? "◎ following " : "") + kind + " ";
  requestAnimationFrame(frame);
}

// ---- interaction: one finger / mouse drags to pan, two fingers pinch to
//      zoom + pan, a tap follows the body under it, the wheel zooms. Unified
//      over Pointer Events so mouse and touch share one code path. ----------
const clampZoom = z => Math.min(60, Math.max(0.04, z));
// Everything below works in CSS px; cam.zoom is CSS px per world unit, and the
// canvas backing store is 1:1 with CSS px, so a client-relative point maps to
// world directly — no render-resolution factor involved (that's the whole point:
// interaction and framing are independent of how pixelated the render is).
function localPt(e) { const r = canvas.getBoundingClientRect(); return [e.clientX - r.left, e.clientY - r.top]; }
function toWorld(lx, ly) { return [cam.x + (lx - canvas.width / 2) / cam.zoom, cam.y + (ly - canvas.height / 2) / cam.zoom]; }

const pointers = new Map();     // active pointerId -> {x, y} in CSS px
let panLast = null;             // last pos for single-pointer drag
let pinch = null;               // {dist, zoom, wx, wy} captured at pinch start
let gestureMoved = false, gesturePinched = false, gestureCount = 0;

function startPinch() {
  const [a, b] = [...pointers.values()];
  const r = canvas.getBoundingClientRect();
  const [wx, wy] = toWorld((a.x + b.x) / 2 - r.left, (a.y + b.y) / 2 - r.top);
  pinch = { dist: Math.hypot(a.x - b.x, a.y - b.y) || 1, zoom: cam.zoom, wx, wy };
  gesturePinched = true; panLast = null; follow = -1;
}

canvas.addEventListener("pointerdown", e => {
  const first = pointers.size === 0;
  try { canvas.setPointerCapture(e.pointerId); } catch {}
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  canvas.classList.add("drag");
  if (first) { panLast = { x: e.clientX, y: e.clientY }; gestureMoved = false; gesturePinched = false; gestureCount = 1; }
  else gestureCount++;
  if (pointers.size === 2) startPinch();
});

canvas.addEventListener("pointermove", e => {
  if (!pointers.has(e.pointerId)) return;
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (pointers.size >= 2 && pinch) {                 // two-finger pinch: zoom + pan
    const [a, b] = [...pointers.values()];
    const r = canvas.getBoundingClientRect();
    const mx = (a.x + b.x) / 2 - r.left, my = (a.y + b.y) / 2 - r.top;
    const dist = Math.hypot(a.x - b.x, a.y - b.y) || 1;
    cam.zoom = clampZoom(pinch.zoom * dist / pinch.dist);
    // Pin the world point captured at gesture start to the current midpoint.
    cam.x = pinch.wx - (mx - canvas.width / 2) / cam.zoom;
    cam.y = pinch.wy - (my - canvas.height / 2) / cam.zoom;
    gestureMoved = true;
    return;
  }

  if (panLast && pointers.size === 1) {              // one-finger / mouse drag: pan
    const dx = e.clientX - panLast.x, dy = e.clientY - panLast.y;
    panLast = { x: e.clientX, y: e.clientY };
    if (Math.abs(dx) + Math.abs(dy) > 6) gestureMoved = true;
    cam.x -= dx / cam.zoom; cam.y -= dy / cam.zoom;  // world units = CSS px / zoom
    follow = -1;                                     // grabbing the view releases follow
  }
});

function liftPointer(e) {
  try { canvas.releasePointerCapture(e.pointerId); } catch {}
  pointers.delete(e.pointerId);
  if (pointers.size < 2) pinch = null;
  if (pointers.size === 1) { const p = [...pointers.values()][0]; panLast = { x: p.x, y: p.y }; }
  if (pointers.size === 0) {
    canvas.classList.remove("drag");
    // A clean single tap (no drag, no pinch) follows the body under it. The
    // hit test reuses the last frame's render dims + density (curW/H/Zoom).
    if (!gestureMoved && !gesturePinched && gestureCount === 1) {
      const [lx, ly] = localPt(e);
      const [cx, cy] = toWorld(lx, ly);
      follow = wasm.nearest_center(sys, curW, curH, cx, cy, curZoom, time); // -1 = release
    }
    panLast = null; gestureCount = 0;
  }
}
canvas.addEventListener("pointerup", liftPointer);
canvas.addEventListener("pointercancel", liftPointer);

canvas.addEventListener("wheel", e => {
  e.preventDefault();
  const [lx, ly] = localPt(e);
  const [wx, wy] = toWorld(lx, ly);                  // point under cursor stays fixed
  cam.zoom = clampZoom(cam.zoom * Math.exp(-e.deltaY * 0.0015));
  if (follow < 0) {
    cam.x = wx - (lx - canvas.width / 2) / cam.zoom;
    cam.y = wy - (ly - canvas.height / 2) / cam.zoom;
  }
}, { passive: false });

// ---- controls --------------------------------------------------------------
$("gen").addEventListener("click", () => generate((parseInt($("seed").value) || 0)));
$("dice").addEventListener("click", () => { const s = (Math.random() * 0xffffff) >>> 0; $("seed").value = s; generate(s); });
$("seed").addEventListener("change", () => generate((parseInt($("seed").value) || 0)));
$("fit").addEventListener("click", fitView);
$("speed").addEventListener("input", () => { speed = parseFloat($("speed").value); $("speedV").textContent = speed.toFixed(1) + "×"; });
// Pixel size only changes render density — framing/zoom are untouched, and the
// frame loop resizes the buffer on its own, so nothing else to do here.
$("pix").addEventListener("input", () => { pix = parseInt($("pix").value) || 1; $("pixV").textContent = pix + "×"; });
window.addEventListener("resize", setupCanvas);

async function main() {
  const res = await fetch("./solar.wasm?v=" + Date.now(), { cache: "no-store" });
  const { instance } = await WebAssembly.instantiate(await res.arrayBuffer(), {});
  wasm = instance.exports;
  posPtr = wasm.alloc(2 * 4);              // scratch for planet_pos
  // Sized to the budget once (+ margin to absorb rounding in computeRender, so
  // w*h*4 can never exceed this and the WASM render stays in bounds).
  bufLen = (PIXEL_BUDGET + 16384) * 4;
  bufPtr = wasm.alloc(bufLen);
  setupCanvas();
  generate(7);
  requestAnimationFrame(frame);
}
main().catch(e => { $("err").style.display = "grid"; $("err").textContent = "failed to load solar.wasm — " + e; console.error(e); });
</script>
</body>
</html>
